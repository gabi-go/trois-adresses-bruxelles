#touch-ui { position:fixed; bottom:0; left:0; right:0; height:120px; pointer-events:none; display:none; }
@media (pointer:coarse){ #touch-ui { display:flex; justify-content:space-between; align-items:flex-end; padding:0 16px 16px; } }
.tc-btn { pointer-events:auto; width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; color:#fff; font-size:22px; user-select:none; -webkit-user-select:none; touch-action:none; }
.tc-btn:active { background:rgba(255,255,255,0.36); }
#tc-dpad { display:flex; gap:6px; align-items:flex-end; }
#tc-btns  { display:flex; gap:6px; align-items:flex-end; }

canvas.width=NW; canvas.height=NH;
function resize(){
  const s=Math.min(window.innerWidth/NW, window.innerHeight/NH);
  canvas.style.width=Math.floor(NW*s)+'px'; canvas.style.height=Math.floor(NH*s)+'px';
}
resize(); window.addEventListener('resize',resize);

// ─── INPUT ───────────────────────────────────────────────────────────────────
const KEY={};
document.addEventListener('keydown',e=>{ KEY[e.code]=true; e.preventDefault(); });
document.addEventListener('keyup',  e=>{ KEY[e.code]=false; });
const pL=()=>KEY['ArrowLeft'] ||KEY['KeyA'];
const pR=()=>KEY['ArrowRight']||KEY['KeyD'];
const pD=()=>KEY['ArrowDown'] ||KEY['KeyS'];
const pJ=()=>KEY['Space']||KEY['KeyZ']||KEY['ArrowUp']||KEY['KeyW'];
const pRun=()=>KEY['ShiftLeft']||KEY['ShiftRight']||KEY['KeyX']||KEY['KeyC'];

// ─── SPRITE RENDERER ─────────────────────────────────────────────────────────
// Each pixel is 1×1 on the 256×240 canvas (scaled up by CSS)
function spr(s, sx, sy, flipH){
  sx=Math.round(sx); sy=Math.round(sy);
  const {px,pal}=s, pw=px[0].length;
  for(let r=0;r<px.length;r++){
    const row=px[r];
    for(let c=0;c<pw;c++){
      const i=parseInt(row[c],16); if(!i) continue;
      ctx.fillStyle=pal[i];
      ctx.fillRect(flipH?sx+(pw-1-c):sx+c, sy+r, 1, 1);
    }
  }
}

// ─── TILE IDs ─────────────────────────────────────────────────────────────────
const T={AIR:0,SOLID:1,BRICK:2,QCOIN:3,QITEM:4,USED:5,PTL:6,PTR:7,PBL:8,PBR:9,POLE:10,PBASE:11,CAS:12,Q1UP:13,LAVA:14,CHAIN:15};
function solid(id){return id===T.SOLID||id===T.BRICK||id===T.QCOIN||id===T.QITEM||id===T.USED||id===T.PTL||id===T.PTR||id===T.PBL||id===T.PBR||id===T.PBASE||id===T.CAS||id===T.Q1UP;}

// ─── BLOCK BOUNCE ANIMATION ──────────────────────────────────────────────────
const bOff={}, bTimer={};
function hitAnim(c,r){ bOff[c*1000+r]=-4; bTimer[c*1000+r]=14; }
function getOff(c,r){ return bOff[c*1000+r]||0; }
function updateBounce(){
  for(const k of Object.keys(bTimer)){
    const t=--bTimer[k], o=t>7?-4+(7-t)*0.57:(14-t)*0.29-4;
    bOff[k]=o;
    if(t<=0){ delete bOff[k]; delete bTimer[k]; }
  }
}

// ─── TILE COLORS ──────────────────────────────────────────────────────────────
const TC={
  sky:'#5c94fc',
  ground:'#c84c0c', gTop:'#e88840', gLine:'#a83808',
  brick:'#c84c0c', bLine:'#a83808', bShine:'#e8b080',

  pole:'#d0d0d0', poleTip:'#f8d000',
  cas:'#b45030', casD:'#883020',
};
const TC2={ // underground palette
  sky:'#080820',
  ground:'#585858', gTop:'#787878', gLine:'#383838',
  brick:'#585858', bLine:'#383838', bShine:'#989898',
  qMain:'#e8a000', qShine:'#f8d000', qDark:'#804800',

  cas:'#b45030', casD:'#883020',

// ─── TILE DRAWING ─────────────────────────────────────────────────────────────
function drawTile(id,sx,sy){
  const C=typeof gS!=='undefined'&&(gS.lv===2||gS.lv===4)?TC2:TC;
  switch(id){
    case T.SOLID:
      ctx.fillStyle=C.ground; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.gTop; ctx.fillRect(sx,sy,TILE,4);
      ctx.fillStyle=C.gLine; ctx.fillRect(sx,sy+4,TILE,1);
      for(let i=0;i<TILE;i+=8){ ctx.fillStyle=C.gLine; ctx.fillRect(sx+i,sy+5,1,TILE-5); }
      break;
    case T.BRICK:
      ctx.fillStyle=C.brick; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.bLine; ctx.fillRect(sx,sy+7,TILE,1); ctx.fillRect(sx+8,sy,1,7); ctx.fillRect(sx,sy+9,8,1);
      ctx.fillStyle=C.bShine; ctx.fillRect(sx,sy,TILE,1); ctx.fillRect(sx,sy,1,7);
      break;
    case T.QCOIN: case T.QITEM:{
      const qf=Math.floor(frameTick/8)%4;
      const qcols=['#e8a000','#f8c000','#f8e840','#f8c000'];
      ctx.fillStyle=qcols[qf]; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.qShine; ctx.fillRect(sx+1,sy+1,TILE-2,2); ctx.fillRect(sx+1,sy+1,2,TILE-2);
      ctx.fillStyle=C.qDark; ctx.fillRect(sx+TILE-2,sy,2,TILE); ctx.fillRect(sx,sy+TILE-2,TILE,2);
      ctx.fillStyle='#fff';
      ctx.fillRect(sx+4,sy+3,7,2); ctx.fillRect(sx+9,sy+5,2,3); ctx.fillRect(sx+4,sy+7,7,2); ctx.fillRect(sx+6,sy+10,3,3);
      break;
    }
    case T.Q1UP: // green ? block — 1-up mushroom
      ctx.fillStyle='#00b800'; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#00e800'; ctx.fillRect(sx+1,sy+1,TILE-2,2); ctx.fillRect(sx+1,sy+1,2,TILE-2);
      ctx.fillStyle='#004800'; ctx.fillRect(sx+TILE-2,sy,2,TILE); ctx.fillRect(sx,sy+TILE-2,TILE,2);
      ctx.fillStyle='#fff';
      ctx.fillRect(sx+4,sy+3,7,2); ctx.fillRect(sx+9,sy+5,2,3); ctx.fillRect(sx+4,sy+7,7,2); ctx.fillRect(sx+6,sy+10,3,3);
      break;
    case T.USED:
      ctx.fillStyle=C.used; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.usedD; ctx.fillRect(sx+1,sy+1,TILE-2,TILE-2);
      ctx.fillStyle='#c09060'; for(let r=3;r<TILE;r+=4) ctx.fillRect(sx+2,sy+r,TILE-4,1);
      break;
    case T.PTL:
      ctx.fillStyle=C.pipe; ctx.fillRect(sx,sy+4,TILE,TILE-4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy+4,4,TILE-4);
      ctx.fillStyle=C.pipeD; ctx.fillRect(sx+TILE-2,sy+4,2,TILE-4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx-2,sy,TILE+2,6);
      ctx.fillStyle=C.pipe;  ctx.fillRect(sx,sy+2,TILE,4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy+2,4,4);
      break;
    case T.PTR:
      ctx.fillStyle=C.pipe; ctx.fillRect(sx,sy+4,TILE,TILE-4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy+4,4,TILE-4);
      ctx.fillStyle=C.pipeD; ctx.fillRect(sx+TILE-2,sy+4,2,TILE-4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy,TILE+2,6);
      ctx.fillStyle=C.pipe;  ctx.fillRect(sx,sy+2,TILE,4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy+2,4,4);
      break;
    case T.PBL: case T.PBR:
      ctx.fillStyle=C.pipe; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy,4,TILE);
      ctx.fillStyle=C.pipeD; ctx.fillRect(sx+TILE-2,sy,2,TILE);
      break;
    case T.POLE:
      ctx.fillStyle=C.pole; ctx.fillRect(sx+7,sy,2,TILE); break;
    case T.PBASE:
      ctx.fillStyle=C.pole; ctx.fillRect(sx+5,sy,6,TILE); break;
    case T.CAS:
      ctx.fillStyle=C.cas; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.casD; ctx.fillRect(sx,sy+7,TILE,2); ctx.fillRect(sx+8,sy,1,7); ctx.fillRect(sx,sy+9,8,1);
      break;
    case T.LAVA:{
      const lf=Math.floor(frameTick/6)%2;
      ctx.fillStyle=lf?'#e83000':'#f86000'; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=lf?'#f86000':'#f8a800'; ctx.fillRect(sx+2,sy+3,4,4); ctx.fillRect(sx+10,sy+2,3,5);
      break;
    }
    case T.CHAIN:
      ctx.fillStyle='#808080'; ctx.fillRect(sx+6,sy,4,TILE);
      ctx.fillStyle='#b0b0b0'; ctx.fillRect(sx+7,sy+2,2,3); ctx.fillRect(sx+7,sy+9,2,3);
      break;
  }
}

// ─── TILEMAP ─────────────────────────────────────────────────────────────────
class TileMap{
  constructor(d,w,h){ this.d=d; this.w=w; this.h=h; }
  get(c,r){ if(c<0||r<0||c>=this.w||r>=this.h) return r>=this.h?T.SOLID:T.AIR; return this.d[r*this.w+c]; }
  set(c,r,id){ if(c>=0&&c<this.w&&r>=0&&r<this.h) this.d[r*this.w+c]=id; }
  draw(cx){
    const c0=Math.max(0,Math.floor(cx/TILE)), c1=Math.min(this.w-1,c0+17);
    for(let c=c0;c<=c1;c++) for(let r=0;r<this.h;r++){
      const id=this.get(c,r); if(!id) continue;
      drawTile(id, c*TILE-cx, r*TILE+getOff(c,r));
    }
  }
}

// ─── WORLD 1-1 ────────────────────────────────────────────────────────────────
function buildLevel(){
  const W=220,H=15;
  const d=new Uint8Array(W*H);
  const s=(c,r,id)=>{ if(c>=0&&c<W&&r>=0&&r<H) d[r*W+c]=id; };
  const row=(c1,c2,r,id)=>{ for(let c=c1;c<=c2;c++) s(c,r,id); };
  const col=(r1,r2,c,id)=>{ for(let r=r1;r<=r2;r++) s(c,r,id); };
  const pipe=(c,h)=>{ s(c,13-h,T.PTL); s(c+1,13-h,T.PTR); for(let r=14-h;r<=12;r++){ s(c,r,T.PBL); s(c+1,r,T.PBR); } };

  // ── Ground (with pit between cols 69-71) ──────────────────────────────────
  row(0,68,13,T.SOLID); row(0,68,14,T.SOLID);
  row(72,W-1,13,T.SOLID); row(72,W-1,14,T.SOLID);

  // ── Section 1: opening blocks (row 8) ─────────────────────────────────────
  s(16,8,T.QITEM);                                       // mushroom block
  s(19,8,T.BRICK); s(20,8,T.QCOIN); s(21,8,T.BRICK);    // coin + bricks
  s(22,8,T.QITEM);                                       // mystery
  s(23,8,T.BRICK);

  // Hidden 1-up hint: single brick above ground near start
  s(15,4,T.BRICK);

  // ── Pipe 1 (2-tall) ───────────────────────────────────────────────────────

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
const P={walkAcc:0.0371, runAcc:0.0562, relDec:0.0320, skidDec:0.05,
         maxWalk:1.5625, maxRun:2.5, grav:0.1875, gravHold:0.0938,
         jVelW:3.1, jVelM:3.6, jVelR:4.2, maxFall:5.0};

// ─── PARTICLES ───────────────────────────────────────────────────────────────
const parts=[];
function addCoin(x,y){ parts.push({t:'coin',x:x+8,y,vy:-4.5,life:50}); }
function addScore(x,y,v){ parts.push({t:'pts',x,y,vy:-0.8,life:55,v}); }
function addBrick(x,y){ for(let i=0;i<4;i++) parts.push({t:'brk',x:x+8,y:y+8,vx:(i<2?-2:2)+(Math.random()-.5),vy:-4-Math.random()*2,life:40}); }
function addDust(x,y,n=3){ for(let i=0;i<n;i++) parts.push({t:'dust',x,y,vx:(Math.random()-.5)*2,vy:-Math.random()*1.5,life:15+Math.random()*10|0}); }
function addStomp(x,y){ for(let i=0;i<5;i++){const a=i/5*Math.PI; parts.push({t:'stp',x,y,vx:Math.cos(a)*2,vy:-Math.sin(a)*2,life:18});} }
function updateParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.life--;
    if(p.life<=0){ parts.splice(i,1); continue; }
    if(p.t==='coin'){ p.y+=p.vy; p.vy+=0.3; }
    if(p.t==='pts')  p.y+=p.vy;
    if(p.t==='brk'){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.35; }
    if(p.t==='dust'){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; }
    if(p.t==='stp'){ p.x+=p.vx; p.y+=p.vy; }
  }
}
function drawParts(cx){
  for(const p of parts){
    const sx=p.x-cx;
    if(p.t==='coin')  spr(SPR.coinHUD,sx-4,p.y);
    else if(p.t==='pts'){ ctx.fillStyle='#fff'; ctx.font='bold 7px monospace'; ctx.fillText(p.v,sx-8,p.y); }
    else if(p.t==='brk'){ ctx.fillStyle=TC.brick; ctx.fillRect(sx-3,p.y-3,6,6); }
    else if(p.t==='dust'){ ctx.fillStyle=`rgba(200,160,80,${p.life/25})`; ctx.fillRect(sx-2,p.y-2,4,4); }
    else if(p.t==='stp'){ ctx.fillStyle=`rgba(255,255,200,${p.life/18})`; ctx.fillRect(sx-2,p.y-2,4,4); }
  }
}

// ─── WORLD OBJECTS ────────────────────────────────────────────────────────────
const objs=[];
function spawnMush(x,y,dir){ objs.push({t:'mush',x,y,vx:dir,vy:0,w:14,h:14,alive:true,em:14}); }
function spawnMush1up(x,y,dir){ objs.push({t:'1up',x,y,vx:dir,vy:0,w:14,h:14,alive:true,em:14}); }
function spawnFlow(x,y){ objs.push({t:'flow',x,y,vx:0,vy:0,w:12,h:16,alive:true,em:16}); }
function spawnStar(x,y){ objs.push({t:'star',x,y,vx:2,vy:-4,w:14,h:14,alive:true,em:0}); }

function updateObjs(tm){
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];
    if(!o.alive){ objs.splice(i,1); continue; }
    if(o.em>0){ o.y--; o.em--; continue; }
    if(o.t==='flow') continue;
    o.vy=Math.min(o.vy+P.grav,P.maxFall);
    o.x+=o.vx;
    const mr=Math.floor((o.y+o.h/2)/TILE);
    if(o.vx>0){ const c=Math.floor((o.x+o.w)/TILE); if(solid(tm.get(c,mr))) o.vx=-Math.abs(o.vx); }
    else if(o.vx<0){ const c=Math.floor(o.x/TILE); if(solid(tm.get(c,mr))) o.vx=Math.abs(o.vx); }
    o.y+=o.vy;
    const br=Math.floor((o.y+o.h)/TILE);
    for(let c=Math.floor((o.x+1)/TILE);c<=Math.floor((o.x+o.w-1)/TILE);c++){
      if(solid(tm.get(c,br))){ o.y=br*TILE-o.h; o.vy=o.t==='star'?-3.5:0; break; }
    }
    if((o.t==='mush'||o.t==='1up')&&o.vy===0){ const fc=o.vx>0?Math.floor((o.x+o.w)/TILE):Math.floor((o.x-1)/TILE); if(!solid(tm.get(fc,Math.floor((o.y+o.h)/TILE)))) o.vx=-o.vx; }
  }
}
function drawObjs(cx){
  for(const o of objs){
    if(!o.alive) continue;
    const sx=o.x-cx;
    if(o.t==='mush') spr(SPR.mush,sx,o.y);
    if(o.t==='1up')  spr(SPR.mush1up,sx,o.y);
    if(o.t==='flow') spr(SPR.flow,sx,o.y);
    if(o.t==='star') spr(SPR.star,sx,o.y);
  }
}

// ─── ENEMIES ─────────────────────────────────────────────────────────────────
class Enemy{
  constructor(x,y,w,h){ this.x=x; this.y=y; this.w=w; this.h=h; this.alive=true; this.vx=0; this.vy=0; }
  get left(){ return this.x; } get right(){ return this.x+this.w; }
  get top(){  return this.y; } get bottom(){ return this.y+this.h; }
  step(tm){
    this.x+=this.vx;
    const vdir=this.vx>0?1:-1;
    const cc=vdir>0?Math.floor((this.x+this.w)/TILE):Math.floor(this.x/TILE);
    for(let r=Math.floor((this.y+1)/TILE);r<=Math.floor((this.y+this.h-1)/TILE);r++)
      if(solid(tm.get(cc,r))){ this.x=vdir>0?cc*TILE-this.w:(cc+1)*TILE; this.vx=-this.vx; break; }
    this.vy=Math.min(this.vy+P.grav,P.maxFall);
    this.y+=this.vy;
    const br=Math.floor((this.y+this.h)/TILE);
    const lc=Math.floor((this.x+1)/TILE), rc=Math.floor((this.x+this.w-1)/TILE);
    let gnd=false;
    for(let c=lc;c<=rc;c++) if(solid(tm.get(c,br))){ this.y=br*TILE-this.h; this.vy=0; gnd=true; break; }
    if(gnd){ const ac=this.vx>0?Math.floor((this.x+this.w)/TILE):Math.floor((this.x-1)/TILE); if(!solid(tm.get(ac,br))) this.vx=-this.vx; }
    if(this.y>NH+32) this.alive=false;
  }
}

class Goomba extends Enemy{
  constructor(x,y){ super(x,y,14,14); this.vx=-0.85; this.ft=0; this.ftimer=0; this.sqT=0; this.dieV=0; this.dying=false; }
  update(tm){
    if(!this.alive) return;
    if(this.dying){ this.y+=this.dieV; this.dieV+=0.3; if(this.y>NH+32) this.alive=false; return; }
    if(this.sqT>0){ if(--this.sqT<=0) this.alive=false; return; }
    this.step(tm);
    if(++this.ftimer>=14){ this.ftimer=0; this.ft^=1; }
  }
  stomp(gs){ this.sqT=25; this.y+=8; gs.addScore(100); addScore(this.x,this.y,100); addStomp(this.x+7,this.y+4); gs.snd('stomp'); }
  kick(){ this.dying=true; this.dieV=-3; }
  draw(cx){
    if(!this.alive) return;
    spr(this.sqT>0?SPR.gS:this.ft===0?SPR.g1:SPR.g2, this.x-cx-1, this.y-2);
  }
}

class Koopa extends Enemy{
  constructor(x,y){ super(x,y,14,22); this.vx=-0.9; this.ft=0; this.ftimer=0; this.sh=false; this.shSlide=false; this.shTimer=0; this.fR=false; }
  update(tm,gs){
    if(!this.alive) return;
    if(this.sh&&!this.shSlide){ if(++this.shTimer>300){ this.sh=false; this.vx=-0.9; } return; }
    this.fR=this.vx>0;
    this.step(tm);
    // Shell hits enemies
    if(this.shSlide){
      for(const e of enemies){
        if(e===this||!e.alive) continue;
        if(this.right>e.left&&this.left<e.right&&this.bottom>e.top&&this.top<e.bottom){
          if(e instanceof Goomba) e.kick();
          else if(e instanceof Koopa&&!e.sh) e.kick();
          gs.addScore(200);
        }
      }
    }
    if(!this.sh){ if(++this.ftimer>=16){ this.ftimer=0; this.ft^=1; } }
  }
  stomp(gs){
    if(!this.sh){ this.sh=true; this.shSlide=false; this.vx=0; this.h=14; this.y+=8; this.shTimer=0; gs.addScore(100); addScore(this.x,this.y,100); gs.snd('stomp'); }
    else if(!this.shSlide){ this.shSlide=true; this.vx=gs.mario.x<this.x?-4:4; gs.snd('kick'); }
    else{ this.shSlide=false; this.vx=0; }
  }
  kick(){ this.sh=true; this.shSlide=true; this.h=14; this.y+=8; this.vx=3; }
  draw(cx){
    if(!this.alive) return;
    spr(this.sh?SPR.kS:this.ft===0?SPR.k1:SPR.k2, this.x-cx-1, this.y-2, !this.fR);
  }
}

    else { this.y=this.baseY-(180-cyc)/30*this.h; this.showing=true; }
  }
  draw(cx){ if(!this.alive||!this.showing) return; spr(SPR.pp,this.px-cx,this.y); }
}

  for(let i=fbs.length-1;i>=0;i--){
    const f=fbs[i]; if(!f.alive){ fbs.splice(i,1); continue; }
    if(f.bowser){
      // Bowser fireballs: wavy horizontal, no gravity
      f.x+=f.vx; f.t=(f.t||0)+0.15; f.y+=Math.sin(f.t)*1.2;

    const br=Math.floor((f.y+8)/TILE);
    if(solid(tm.get(Math.floor((f.x+4)/TILE),br))){ f.y=br*TILE-8; f.vy=-3; if(++f.b>5) f.alive=false; }
    if(f.x<-16||f.x>tilemap.w*TILE+16) f.alive=false;

// ─── MARIO CLASS ─────────────────────────────────────────────────────────────
class Mario{
  constructor(x,y){
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.onGnd=false; this.fR=true;
    this.form='S'; // S=small B=big F=fire
    this.jmp=false; this.crc=false;
    this.dead=false; this.dVy=0; this.dT=0;
    this.invT=0; this.hitT=0;
    this.skid=false;
    this.grow=false; this.gT=0;
    this.pole=false; this.pVy=1.5;
    this.wF=0; this.wT=0; // walk animation
    this.fbT=0; // fireball cooldown
    this.wasGnd=false;
    this.combo=0;
    this.warpT=0; // pipe warp countdown
  }
  get w(){ return this.form==='S'?12:14; }
  get h(){ return this.form==='S'?(this.crc?12:16):(this.crc?16:24); }
  get left(){  return this.x; }
  get right(){ return this.x+this.w; }
  get top(){   return this.y; }
  get bottom(){ return this.y+this.h; }

  update(tm,gs){
    if(this.dead){ this._dead(gs); return; }
    if(this.pole){ this._pole(tm,gs); return; }
    if(this.grow){ if(--this.gT<=0) this.grow=false; return; }
    if(this.warpT>0){ this.y+=0.6; if(--this.warpT<=0) gs.enterPipe(); return; }

    const run=pRun(), left=pL(), right=pR(), jump=pJ(), dn=pD();
    this.wasGnd=this.onGnd;
    this.crc=dn&&this.form!=='S'&&this.onGnd;

    // Horizontal
    const maxV=run?P.maxRun:P.maxWalk, acc=run?P.runAcc:P.walkAcc;
    if(!this.crc){
      if(right&&!left){ this.fR=true; this.skid=this.vx<-0.1; this.vx=this.vx<maxV?Math.min(this.vx+acc,maxV):Math.max(this.vx-P.skidDec,maxV); }
      else if(left&&!right){ this.fR=false; this.skid=this.vx>0.1; this.vx=this.vx>-maxV?Math.max(this.vx-acc,-maxV):Math.min(this.vx+P.skidDec,-maxV); }
      else{ this.skid=false; this.vx=this.vx>0?Math.max(0,this.vx-P.relDec):Math.min(0,this.vx+P.relDec); }
    }

    // Jump
    if(jump&&this.onGnd&&!this.crc){
      const sp=Math.abs(this.vx);
      this.vy=-(sp>=P.maxRun*0.6?P.jVelR:sp>=P.maxWalk*0.5?P.jVelM:P.jVelW);
      this.onGnd=false; this.jmp=true;
      addDust(this.x+this.w/2,this.y+this.h); gs.snd('jump');
    }
    if(!jump) this.jmp=false;
    this.vy=Math.min(this.vy+((this.jmp&&this.vy<0)?P.gravHold:P.grav),P.maxFall);

    this._moveX(tm); this._moveY(tm,gs);
    if(this.x<0){ this.x=0; this.vx=0; }

    // Walk anim
    if(this.onGnd&&Math.abs(this.vx)>0.1){
      const period=Math.max(4,Math.round(12*(1-Math.abs(this.vx)/P.maxRun*0.7)));
      if(++this.wT>=period){ this.wT=0; this.wF=(this.wF+1)%4; }
    } else { if(!this.onGnd) this.wF=4; else{ this.wF=0; this.wT=0; } }
    if(!this.wasGnd&&this.onGnd) addDust(this.x+this.w/2,this.y+this.h,4);

    // Fireball
    if(this.fbT>0) this.fbT--;
    if(this.form==='F'&&pRun()&&this.fbT===0){ fireball(this.x+(this.fR?this.w:0),this.y+8,this.fR?1:-1); this.fbT=22; gs.snd('fb'); }

    if(this.hitT>0) this.hitT--;
    if(this.invT>0) this.invT--;

    // Warp pipe entry (press DOWN while standing on a pipe top)
    if(pD()&&this.onGnd&&this.warpT===0&&Math.abs(this.vx)<0.5){
      const pc=Math.floor((this.x+this.w/2)/TILE);
      const pr=Math.floor((this.y+this.h)/TILE);
      const tid=tm.get(pc,pr); const tid2=tm.get(pc+1,pr);
      if(tid===T.PTL||tid===T.PTR||tid2===T.PTL||tid2===T.PTR){
        if(gs.lv===1){ this.warpT=55; this.vx=0; gs.snd('powerup'); }
      }
    }

    // Flagpole
    if(this.right>=(gs.poleCol||200)*TILE+4&&!this.pole&&this.y>2*TILE&&gs.phase==='PLAY'){
      this.pole=true; this.x=(gs.poleCol||200)*TILE+1; this.vx=0; this.vy=0; this.onGnd=false; gs.snd('flag');
    }
    if(this.onGnd) this.combo=0;
  }

  _dead(gs){ if(this.dT===0){ this.dVy=-6; } this.dT++; this.dVy+=0.25; this.y+=this.dVy; if(this.dT>180) gs._endDeath(); }
  _pole(tm,gs){ this.y+=this.pVy; this.pVy=Math.min(this.pVy+0.12,3.5); if(this.y>=13*TILE-this.h){ this.y=13*TILE-this.h; this.pole=false; this.onGnd=true; gs.levelClear(); } }

  _moveX(tm){
    this.x+=this.vx;
    const w=this.w,h=this.h,dir=this.vx>0?1:-1;
    const cc=dir>0?Math.floor((this.x+w)/TILE):Math.floor(this.x/TILE);
    for(let r=Math.floor((this.y+1)/TILE);r<=Math.floor((this.y+h-1)/TILE);r++)
      if(solid(tm.get(cc,r))){ this.x=dir>0?cc*TILE-w:(cc+1)*TILE; this.vx=0; break; }
  }
  _moveY(tm,gs){
    this.y+=this.vy;
    const w=this.w,h=this.h;
    if(this.vy>=0){
      const r=Math.floor((this.y+h)/TILE); let hit=false;
      for(let c=Math.floor((this.x+1)/TILE);c<=Math.floor((this.x+w-1)/TILE);c++)
        if(solid(tm.get(c,r))){ this.y=r*TILE-h; this.vy=0; this.onGnd=true; this.jmp=false; hit=true; break; }
      if(!hit) this.onGnd=false;
    } else {
      this.onGnd=false;
      const r=Math.floor(this.y/TILE);
      for(let c=Math.floor((this.x+1)/TILE);c<=Math.floor((this.x+w-1)/TILE);c++){
        if(solid(tm.get(c,r))){ this.y=(r+1)*TILE; this.vy=0; this.jmp=false; this._hitBlk(tm,c,r,tm.get(c,r),gs); break; }
      }
    }
  }
  _hitBlk(tm,c,r,id,gs){
    hitAnim(c,r);
    if(id===T.QCOIN||id===T.QITEM){
      tm.set(c,r,T.USED);
      if(id===T.QCOIN){ gs.addCoins(1); addCoin(c*TILE,r*TILE); addScore(c*TILE+4,r*TILE,200); gs.snd('coin'); }
      else{
        // Instant powerup — no pickup required
        if(this.form==='S'){ this.form='B'; this.y-=8; this.grow=true; this.gT=48; gs.addScore(1000); addScore(c*TILE+4,r*TILE,1000); }
        else if(this.form==='B'){ this.form='F'; this.grow=true; this.gT=48; gs.addScore(1000); addScore(c*TILE+4,r*TILE,1000); }
        else{ gs.addScore(1000); addScore(c*TILE+4,r*TILE,1000); }
        gs.snd('powerup');
      }
    } else if(id===T.Q1UP){
      tm.set(c,r,T.USED);
      spawnMush1up(c*TILE+1,(r-1)*TILE,this.fR?1:-1);
      gs.snd('powerup');
    } else if(id===T.BRICK){
      if(this.form!=='S'){ tm.set(c,r,T.AIR); addBrick(c*TILE,r*TILE); gs.addScore(50); gs.snd('brk'); }
      else gs.snd('bump');
    }
  }
  hit(gs){
    if(this.invT>0||this.hitT>0||this.dead) return;
    if(this.form!=='S'){ this.form='S'; this.y+=8; this.hitT=120; gs.snd('dmg'); }
    else this.die(gs);
  }
  die(gs){ if(this.dead) return; this.dead=true; this.dT=0; this.dVy=-6; gs.snd('die'); gs.marioDied(); }
  stompScore(){ const S=[100,200,400,800,1000,2000,4000,8000]; return S[Math.min(this.combo++,7)]; }

  draw(cx){
    if(this.dead){ this._drawSpr(cx); return; }
    if(this.grow&&Math.floor(this.gT/6)%2===0) return;
    if(this.hitT>0&&Math.floor(this.hitT/4)%2!==0) return;
    if(this.invT>0&&Math.floor(this.invT/3)%2!==0) return;
    this._drawSpr(cx);
  }
  _drawSpr(cx){
    const sx=Math.round(this.x-cx), sy=Math.round(this.y), flip=!this.fR;
    let s;
    if(this.dead){ s=this.form==='S'?SPR.msD:SPR.mb0; }
    else if(this.form==='S'){
      if(!this.onGnd) s=SPR.msJ;
      else{ const fr=[SPR.ms0,SPR.ms1,SPR.ms3,SPR.ms2]; s=fr[this.wF%4]; }
    } else {
      const pfx=this.form==='F'?'f':'mb';
      if(this.crc) s=SPR[pfx==='f'?'fC':'mbC'];
      else if(!this.onGnd) s=SPR[pfx==='f'?'fJ':'mbJ'];
      else{ const fr=[SPR[pfx+'0'],SPR[pfx+'1'],SPR[pfx+'0'],SPR[pfx+'2']]; s=fr[this.wF%4]; }
    }
    if(this.skid&&this.onGnd){ ctx.fillStyle='rgba(255,255,200,0.8)'; ctx.fillRect(sx+(flip?this.w-3:0),sy+this.h-2,3,2); }
    spr(s,sx,sy,flip);
    if(this.invT>0&&Math.floor(Date.now()/100)%3===0){ ctx.fillStyle='rgba(255,255,0,0.4)'; ctx.fillRect(sx,sy,this.w,this.h); }
  }
}

// ─── MUSIC ENGINE (SMB1 Overworld Theme) ─────────────────────────────────────
class Music{
  constructor(){ this.ac=null; this.muted=false; this.playing=false; this.noteIdx=0; this.noteTimer=0; this.src=null; document.addEventListener('keydown',()=>this._init(),{once:true}); }
  _init(){
    if(this.ac) return;
    this.ac=new(window.AudioContext||window.webkitAudioContext)();
    this.masterGain=this.ac.createGain(); this.masterGain.gain.value=0.25; this.masterGain.connect(this.ac.destination);
  }
  // SMB1 Underground theme — simplified
  static THEME2=[
    [311,6],[0,2],[330,3],[0,1],[311,6],[0,2],[277,6],[0,4],
    [311,9],[0,24],[370,9],[0,24],[311,9],[0,9],
    [311,6],[0,2],[330,3],[0,1],[311,6],[0,2],[277,6],[0,4],
    [311,9],[0,9],[587,9],[0,6],[554,9],[0,24],
    [466,6],[0,3],[415,6],[0,6],[370,9],[0,6],
    [311,6],[0,6],[277,6],[0,6],[233,9],[0,6],[220,24],[0,18],
    [233,6],[0,3],[246,6],[0,3],[261,6],[0,3],[277,9],[0,6],
    [294,6],[0,3],[311,9],[0,6],[370,6],[0,3],[415,6],[0,3],[466,24],[0,18],
  ];
  // SMB1 Overworld theme — simplified faithful transcription
  // [freq, frames_at_60fps]  0=rest
  static THEME=[
    [659,6],[0,3],[659,6],[0,10],[659,6],[0,10],[523,6],[659,10],[0,6],[784,18],[0,18],[392,18],[0,18],
    [523,18],[0,18],[392,12],[0,18],[330,18],[0,18],[440,12],[494,12],[0,6],[466,12],[0,6],[440,12],[0,6],
    [392,8],[659,8],[784,8],[0,3],[880,12],[0,6],[698,12],[784,12],[0,6],[659,12],[0,6],[523,12],[0,3],[587,12],[494,12],[0,12],
    // phrase 2 repeat start
    [523,18],[0,18],[392,12],[0,18],[330,18],[0,18],[440,12],[494,12],[0,6],[466,12],[0,6],[440,12],[0,6],
    [392,8],[659,8],[784,8],[0,3],[880,12],[0,6],[698,12],[784,12],[0,6],[659,12],[0,6],[523,12],[0,3],[587,12],[494,12],[0,12],
  ];
  _note(freq,dur){
    if(!this.ac||this.muted||!freq) return;
    const t=this.ac.currentTime;
    const o=this.ac.createOscillator(); o.type='square'; o.frequency.value=freq;
    const g=this.ac.createGain(); g.gain.setValueAtTime(1,t); g.gain.linearRampToValueAtTime(0,t+dur*0.8/60);
    o.connect(g); g.connect(this.masterGain);
    o.start(t); o.stop(t+dur/60+0.05);
  }
  tick(){
    if(!this.playing||this.muted) return;
    const theme=typeof gS!=='undefined'&&(gS.lv===2||gS.lv===4)?Music.THEME2:Music.THEME;
    if(this._lastTheme!==theme){ this._lastTheme=theme; this.noteIdx=0; this.noteTimer=0; }
    if(this.noteTimer<=0){
      const [freq,frames]=theme[this.noteIdx];
      this._note(freq,frames);
      this.noteTimer=frames;
      this.noteIdx=(this.noteIdx+1)%theme.length;
    }
    this.noteTimer--;
  }
  start(){ this.playing=true; this.noteIdx=0; this.noteTimer=0; this._lastTheme=null; }
  stop(){ this.playing=false; }
}

// ─── SFX ENGINE ───────────────────────────────────────────────────────────────
class SFX{
  constructor(music){ this.ac=null; this.muted=false; this.music=music; document.addEventListener('keydown',()=>this._init(),{once:true}); }
  _init(){ if(this.ac) return; this.ac=this.music.ac||(this.music.ac=new(window.AudioContext||window.webkitAudioContext)()); if(!this.music.masterGain){ this.music.masterGain=this.ac.createGain(); this.music.masterGain.gain.value=0.25; this.music.masterGain.connect(this.ac.destination); } }
  _beep(f,d,t='square',v=0.2,dl=0){
    if(!this.ac||this.muted) return;
    const at=this.ac.currentTime+dl;
    const o=this.ac.createOscillator(),g=this.ac.createGain();
    o.type=t; o.frequency.setValueAtTime(f,at);
    g.gain.setValueAtTime(v,at); g.gain.exponentialRampToValueAtTime(0.001,at+d);
    o.connect(g); g.connect(this.ac.destination);
    o.start(at); o.stop(at+d+0.01);
  }
  play(n){
    if(!this.ac) return;
    switch(n){
      case 'jump':   this._beep(400,.08); this._beep(600,.07,undefined,.15,.05); break;
      case 'coin':   this._beep(988,.06); this._beep(1319,.1,undefined,.12,.06); break;
      case 'brk':    this._beep(200,.05,'sawtooth',.25); this._beep(150,.1,'sawtooth',.1,.05); break;
      case 'bump':   this._beep(200,.07,'square',.2); break;
      case 'powerup':this._beep(600,.08); this._beep(800,.08,undefined,.15,.08); break;
      case '1up':    [523,659,784,659,784,1047].forEach((f,i)=>this._beep(f,.08,undefined,.15,i*.08)); break;
      case 'dmg':    [440,360,280].forEach((f,i)=>this._beep(f,.1,'sawtooth',.2,i*.12)); break;
      case 'die':    this._beep(440,.15,'sawtooth',.3); this._beep(200,.5,'sawtooth',.2,.15); break;
      case 'stomp':  this._beep(350,.06,'square',.25); break;
      case 'kick':   this._beep(280,.08,'square',.3); break;
      case 'flag':   [300,350,400,450,500,550,600,650].forEach((f,i)=>this._beep(f,.08,undefined,.15,i*.07)); break;
      case 'fb':     this._beep(700,.04,'square',.1); this._beep(500,.04,'square',.05,.04); break;
    }
  }
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
const gS={
  phase:'INTRO', score:0, coins:0, lives:3, world:1, lv:1, poleCol:200,
  time:400, _tAcc:0, _iT:120, _clT:0, _goT:0, _nextLv:1,
  hiScore:parseInt(localStorage.getItem('mhs')||'0'),
  mario:null,
  snd(n){ sfx.play(n); },
  addScore(n){ this.score+=n; if(this.score>this.hiScore){ this.hiScore=this.score; localStorage.setItem('mhs',this.hiScore); } },
  addCoins(n){ this.coins++; this.score+=200; if(this.coins>=100){ this.coins=0; this.lives++; sfx.play('1up'); } },
  levelClear(){
    this.phase='CLEAR';
    this._nextLv=this.lv<4?this.lv+1:1;
    if(this._nextLv===1) this.world++;
    this._bonusRemain=Math.ceil(this.time);
    this._bonusTick=0;
    this._clT=this._bonusRemain*2+220;
  },
  enterPipe(){ this.lv=2; this._reset(); },
  marioDied(){ this.phase='DEAD'; },
  _endDeath(){ if(--this.lives<=0){ this.phase='GAMEOVER'; this._goT=300; } else this._reset(); },
  update(){
    music.tick();
    if(this.phase==='PAUSE') return;
    if(this.phase==='INTRO'){ if(--this._iT<=0){ this.phase='PLAY'; music.start(); } return; }
    if(this.phase==='DEAD'){ mario.update(tilemap,this); return; }
    if(this.phase==='GAMEOVER'){ if(--this._goT<=0) this._newGame(); return; }
    if(this.phase==='CLEAR'){
      mario.update(tilemap,this);
      if(this._bonusRemain>0&&++this._bonusTick%2===0){ this._bonusRemain--; this.addScore(50); this.snd('coin'); }
      if(--this._clT<=0){ this.lv=this._nextLv; this._reset(); }
      return;
    }

    // PLAY
    if(++this._tAcc>=40){ this._tAcc=0; this.time=Math.max(0,this.time-1); if(this.time===0) mario.die(this); }
    mario.update(tilemap,this);
    updateObjs(tilemap); updateParts(); updateBounce(); updateFBs(tilemap);
    updatePlants(); updateFirebars();
    // Cheep-Cheep spawner (level 3 only)
    if(this.lv===3){
      if(!this._ccT) this._ccT=0;
      if(++this._ccT>=(55+Math.random()*40|0)){
        this._ccT=0;
        const fromRight=Math.random()>0.5;
        const spawnX=fromRight?camera.x+NW+16:camera.x-16;
        const vx=fromRight?-2.2:2.2;
        const spawnY=7*TILE+Math.random()*3*TILE|0;
        enemies.push(new CheepCheep(spawnX,spawnY,vx));
      }
    }
    // Level 4: Bowser, axe, bridge collapse, lava kill
    if(this.lv===4){
      if(bowser&&bowser.alive) bowser.update(tilemap,this);
      // Bridge collapse animation
      if(bridgeCollapsing){
        if(++bridgeTimer%4===0){
          const col=bridgeC2-Math.floor(bridgeTimer/4);
          if(col>=bridgeC1){
            for(let r=bridgeRow;r<tilemap.h;r++) tilemap.set(col,r,T.AIR);
            addBrick(col*TILE,bridgeRow*TILE);
          } else { bridgeCollapsing=false; if(bowser&&bowser.alive){ bowser.alive=false; bowser=null; } }
        }
      }
      // Axe vs Mario
      if(axeActive&&mario.right>axeX&&mario.left<axeX+10&&mario.bottom>axeY&&mario.top<axeY+12){
        axeActive=false; bridgeCollapsing=true; bridgeTimer=0;
        if(bowser) bowser.vx=0;
        this.snd('powerup'); this.addScore(5000); addScore(mario.x,mario.y-12,'5000');
        this.levelClear();
      }
      // Bowser fireball vs Mario
      for(const f of fbs){ if(!f.alive||!f.bowser) continue; if(mario.right>f.x-5&&mario.left<f.x+5&&mario.bottom>f.y-5&&mario.top<f.y+5) mario.hit(this); }
      // Bowser vs Mario (contact damage, not stompable in classic SMB1)
      if(bowser&&bowser.alive&&mario.right>bowser.left&&mario.left<bowser.right&&mario.bottom>bowser.top&&mario.top<bowser.bottom){
        if(mario.invT>0){ bowser.alive=false; bowser=null; this.addScore(5000); }
        else mario.hit(this);
      }
      // Lava kill: Mario touches LAVA tile
      const mbc=Math.floor((mario.x+mario.w/2)/TILE), mbr=Math.floor((mario.bottom+1)/TILE);
      if(tilemap.get(mbc,mbr)===T.LAVA) mario.die(this);
    }
    for(const e of enemies) e.update(tilemap,this);
    if(mario.y>NH+64) mario.die(this);

    // Enemy vs Mario
    for(const e of enemies){
      if(!e.alive) continue;
      if(mario.right>e.left&&mario.left<e.right&&mario.bottom>e.top&&mario.top<e.bottom){
        if(mario.invT>0){
          // Star invincibility — kill on contact
          if(e instanceof Goomba) e.kick();
          else if(e instanceof Koopa) e.kick();
          const sc=mario.stompScore(); this.addScore(sc); addScore(e.x,e.y,sc); this.snd('stomp');
          continue;
        }
        const stomp=mario.vy>0.5&&mario.bottom<e.top+e.h*0.5+4;
        if(stomp){ e.stomp(this); mario.vy=-3.5; }
        else mario.hit(this);
      }
    }
    // Firebar vs Mario
    for(const fb of firebars) if(fb.hits(mario)) mario.hit(this);

    // Piranha plant vs Mario
    for(const p of plants){
      if(!p.showing) continue;
      if(mario.right>p.left&&mario.left<p.right&&mario.bottom>p.top&&mario.top<p.bottom) mario.hit(this);
    }
    // Fireball vs piranha plant
    for(const f of fbs) if(f.alive) for(const p of plants){ if(p.showing&&f.x+8>p.left&&f.x<p.right&&f.y+8>p.top&&f.y<p.bottom){ f.alive=false; p.showing=false; p.timer=0; this.addScore(200); addScore(p.px,p.y,200); } }

    // Fireball vs enemy
    for(const f of fbs){ if(!f.alive) continue; for(const e of enemies){ if(!e.alive) continue; if(f.x+8>e.left&&f.x<e.right&&f.y+8>e.top&&f.y<e.bottom){ f.alive=false; if(e instanceof Goomba) e.kick(); else if(e instanceof Koopa&&!e.sh) e.kick(); this.addScore(200); addScore(e.x,e.y,200); } } }
    // Obj vs Mario
    for(const o of objs){
      if(!o.alive||o.em>0) continue;
      if(mario.right>o.x&&mario.left<o.x+o.w&&mario.bottom>o.y&&mario.top<o.y+o.h){
        o.alive=false;
        switch(o.t){
          case 'mush': if(mario.form==='S'){ mario.form='B'; mario.y-=8; mario.grow=true; mario.gT=48; } this.addScore(1000); addScore(o.x,o.y,1000); sfx.play('powerup'); break;
          case 'flow': if(mario.form!=='F'){ mario.form='F'; mario.grow=true; mario.gT=48; } this.addScore(1000); addScore(o.x,o.y,1000); sfx.play('powerup'); break;
          case 'star': mario.invT=600; this.addScore(1000); addScore(o.x,o.y,1000); sfx.play('powerup'); break;
          case '1up':  this.lives++; addScore(o.x,o.y,'1UP'); sfx.play('1up'); break;
        }
      }
    }
    camera.follow(mario,tilemap.w);
  },
  _reset(){
    const ld=this.lv===2?buildLevel2():this.lv===3?buildLevel3():this.lv===4?buildLevel4():buildLevel();
    tilemap.d=ld.d; tilemap.w=ld.w; tilemap.h=ld.h;
    this.poleCol=this.lv===2?185:this.lv===3?182:this.lv===4?999:200;
    this._ccT=0;
    // Bowser castle init
    bowser=null; axeActive=false; bridgeCollapsing=false; bridgeTimer=0;
    if(this.lv===4&&ld.bowserX!==undefined){
      bowser=new Bowser(ld.bowserX,ld.bowserY);
      axeX=ld.axeX; axeY=ld.axeY; axeActive=true;
      bridgeRow=ld.bridgeRow; bridgeC1=ld.bridgeC1; bridgeC2=ld.bridgeC2;
    }
    enemies.length=0;
    ld.spawns.forEach(sp=>{ if(sp.type==='g') enemies.push(new Goomba(sp.col*TILE,sp.row*TILE)); else enemies.push(new Koopa(sp.col*TILE,sp.row*TILE)); });
    objs.length=0; parts.length=0; fbs.length=0; plants.length=0; firebars.length=0;
    if(ld.pipePlants) ld.pipePlants.forEach(p=>plants.push(new PiranhaPlant(p.c,p.r)));
    if(ld.firebars)   ld.firebars.forEach(f=>firebars.push(new Firebar(f.cx*TILE+8,f.cy*TILE+8,f.len,f.spd)));
    mario.x=3*TILE; mario.y=11*TILE; mario.vx=0; mario.vy=0;
    mario.dead=false; mario.dT=0; mario.form='S'; mario.onGnd=false;
    mario.hitT=0; mario.invT=0; mario.pole=false; mario.wF=0; mario.wT=0; mario.warpT=0;
    camera.x=0; this.time=400; this._tAcc=0; this._iT=90; this.phase='INTRO';
    music.stop();
  },
  _newGame(){ this.score=0; this.coins=0; this.lives=3; this.world=1; this.lv=1; this._nextLv=1; this._reset(); },
};

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD(){
  // SMB1-style black strip at top
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,NW,24);

  ctx.fillStyle='#fff';
  ctx.font='bold 8px monospace';

  // Score + hi-score
  ctx.fillText('MARIO',16,9);
  ctx.fillText(String(gS.score).padStart(6,'0'),16,19);
  if(gS.hiScore>0){
    ctx.fillStyle='#f8c000'; ctx.fillText('HI',56,9);
    ctx.fillStyle='#fff'; ctx.fillText(String(gS.hiScore).padStart(6,'0'),56,19);
  }

  // Coins
  spr(SPR.coinHUD,88,10);
  ctx.fillText('×'+String(gS.coins).padStart(2,'0'),98,19);

  // Lives
  ctx.fillStyle='#f8a840';
  ctx.fillRect(122,12,6,6); ctx.fillRect(119,15,12,4); // mini mario hat pixel
  ctx.fillStyle='#fff';
  ctx.fillText('×'+gS.lives,134,19);

  // World
  ctx.fillText('WORLD',144,9);
  ctx.fillText(`${gS.world}-${gS.lv}`,152,19);

  // Time
  ctx.fillText('TIME',200,9);
  const urgency=gS.time<100&&Math.floor(Date.now()/300)%2;
  ctx.fillStyle=urgency?'#ff8888':'#fff';
  ctx.fillText(String(Math.ceil(gS.time)).padStart(3,'0'),200,19);
}

// ─── SCENERY ─────────────────────────────────────────────────────────────────
// SMB1-faithful clouds: 3 overlapping circles + rectangular base
function drawCloud(x,y){
  ctx.fillStyle='#fff';
  // base rectangle
  ctx.fillRect(x,y+10,48,10);
  // three bumps
  ctx.beginPath(); ctx.arc(x+10,y+10,10,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+24,y+4,14,0,Math.PI*2);  ctx.fill();
  ctx.beginPath(); ctx.arc(x+38,y+10,10,0,Math.PI*2); ctx.fill();
}
// SMB1-faithful hills: green semicircle with lighter pattern
function drawHill(cx,cy,r){
  ctx.fillStyle='#00a800';
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,0); ctx.lineTo(cx+r,cy); ctx.lineTo(cx-r,cy); ctx.closePath(); ctx.fill();
  // dot highlights
  ctx.fillStyle='#00c800';
  const dots=[-r*.45, 0, r*.45];
  for(const dx of dots){ ctx.beginPath(); ctx.arc(cx+dx,cy-r*.55,r*.12,0,Math.PI*2); ctx.fill(); }
}
// SMB1 bush (green rectangle clusters)
function drawBush(x,y){
  ctx.fillStyle='#00a800';
  ctx.fillRect(x+4,y+6,24,6);
  ctx.beginPath(); ctx.arc(x+10,y+6,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+20,y+4,8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+28,y+6,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#00c800';
  ctx.beginPath(); ctx.arc(x+20,y+2,4,0,Math.PI*2); ctx.fill();
}

function drawWater(){
  // Animated water for level 3 (fills from row 12 down)
  const wy=12*TILE;
  ctx.fillStyle='#0044a8'; ctx.fillRect(0,wy,NW,NH-wy);
  ctx.fillStyle='#0060cc';
  const woff=Math.floor(frameTick/3)%16;
  for(let y=wy+4;y<NH;y+=12){ for(let x=-16+woff;x<NW+16;x+=16) ctx.fillRect(x,y,8,3); }
}

function drawScenery(cx){
  if(gS.lv===2||gS.lv===4) return; // no scenery underground or in castle
  if(gS.lv===3){ drawWater(); // still draw clouds for 1-3 but add water
    const clouds=[{x:96,y:36},{x:256,y:28},{x:480,y:40},{x:700,y:32},{x:920,y:38},{x:1140,y:30}];
    for(const c of clouds){ const sx=c.x-cx*.5; if(sx<-60||sx>NW+60) continue; drawCloud(sx,c.y); }
    return;
  }
  // Cloud positions (x in world coords, parallax 0.5)
  const clouds=[{x:48,y:36},{x:128,y:28},{x:192,y:40},{x:320,y:32},{x:400,y:38},{x:512,y:28},{x:640,y:36},{x:784,y:30},{x:928,y:38}];
  for(const c of clouds){ const sx=c.x-cx*.5; if(sx<-60||sx>NW+60) continue; drawCloud(sx,c.y); }

  // Hills (ground decorations, parallax 0.7)
  const hills=[{x:48,r:32},{x:160,r:44},{x:288,r:32},{x:432,r:44},{x:576,r:32},{x:720,r:44},{x:864,r:32}];
  for(const h of hills){ const sx=h.x-cx*.7; if(sx<-h.r*2||sx>NW+h.r*2) continue; drawHill(sx+h.r,NH-32,h.r); }

  // Bushes
  const bushes=[{x:96},{x:224},{x:352},{x:480},{x:608},{x:736}];
  for(const b of bushes){ const sx=b.x-cx; if(sx<-48||sx>NW+48) continue; drawBush(sx,NH-32); }
}

// Flagpole flag animation
function drawFlag(cx){
  if(gS.lv===4) return;
  const px=(gS.poleCol||200)*TILE-cx; if(px<-10||px>NW+20) return;
  // Gold tip
  ctx.fillStyle='#f8d000'; ctx.beginPath(); ctx.arc(px+9,2*TILE+3,4,0,Math.PI*2); ctx.fill();
  // Waving flag
  const w=Math.sin(Date.now()/200)*2;
  ctx.fillStyle='#e82020';
  ctx.beginPath(); ctx.moveTo(px+9,2*TILE+7); ctx.lineTo(px+9+16+w,2*TILE+14); ctx.lineTo(px+9,2*TILE+21); ctx.closePath(); ctx.fill();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const cx=camera.x;
  const skyCols=['#5c94fc','#080820','#e87820','#1a0808']; // 1-1 blue / 1-2 black / 1-3 sunset / 1-4 dark castle
  ctx.fillStyle=skyCols[(gS.lv-1)%4]||'#5c94fc'; ctx.fillRect(0,0,NW,NH);

  if(gS.phase==='INTRO'){ drawIntro(); return; }
  if(gS.phase==='GAMEOVER'){ drawGameOver(); return; }

  drawScenery(cx);
  tilemap.draw(cx);
  drawFlag(cx);
  drawObjs(cx); drawFBs(cx); drawPlants(cx); drawFirebars(cx);
  for(const e of enemies) e.draw(cx);
  // Bowser & axe (level 4)
  if(bowser&&bowser.alive) bowser.draw(cx);
  if(axeActive){ const as=axeX-cx; spr(SPR.axe,as,axeY); ctx.fillStyle='#f8d000'; ctx.fillRect(as+3,axeY-8,2,8); } // axe on a chain
  drawParts(cx);
  mario.draw(cx);
  drawHUD();
  if(gS.phase==='CLEAR') drawClear();
  if(gS.phase==='PAUSE'){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,24,NW,NH-24);
    ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
    ctx.fillText('PAUSED',NW/2,NH/2-6);
    ctx.font='bold 7px monospace';
    ctx.fillText('P / ESC to continue  |  M to mute',NW/2,NH/2+12);
    ctx.textAlign='left';
  }
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
const ld=buildLevel();
const tilemap=new TileMap(ld.d,ld.w,ld.h);
const mario=new Mario(3*TILE,11*TILE);
const camera=new Camera();
const music=new Music();
const sfx=new SFX(music);
const enemies=[];
gS.mario=mario;
ld.spawns.forEach(sp=>{ if(sp.type==='g') enemies.push(new Goomba(sp.col*TILE,sp.row*TILE)); else enemies.push(new Koopa(sp.col*TILE,sp.row*TILE)); });
if(ld.pipePlants) ld.pipePlants.forEach(p=>plants.push(new PiranhaPlant(p.c,p.r)));
if(ld.firebars)   ld.firebars.forEach(f=>firebars.push(new Firebar(f.cx*TILE+8,f.cy*TILE+8,f.len,f.spd)));

// M = mute / P = pause
document.addEventListener('keydown',e=>{
  if(e.code==='KeyM'){ sfx.muted=!sfx.muted; music.muted=!music.muted; }
  if((e.code==='KeyP'||e.code==='Escape')&&gS.phase==='PLAY')  { gS.phase='PAUSE'; music.muted=true; }
  else if((e.code==='KeyP'||e.code==='Escape')&&gS.phase==='PAUSE'){ gS.phase='PLAY'; music.muted=sfx.muted; }
});

// ─── TOUCH CONTROLS ──────────────────────────────────────────────────────────
(function(){
  const map={
    'tc-l':'ArrowLeft','tc-r':'ArrowRight',
    'tc-a':'Space',    'tc-b':'ShiftLeft',
  };
  Object.entries(map).forEach(([id,code])=>{
    const el=document.getElementById(id);
    if(!el) return;
    const on =()=>{ KEY[code]=true;  music._init&&music._init(); sfx._init&&sfx._init(); };
    const off=()=>{ KEY[code]=false; };
    el.addEventListener('touchstart',e=>{ e.preventDefault(); on(); },{passive:false});
    el.addEventListener('touchend',  e=>{ e.preventDefault(); off();},{passive:false});
    el.addEventListener('touchcancel',e=>{ off(); });
  });
})();

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
let last=0,acc=0,frameTick=0;
function loop(ts){ acc+=ts-last; last=ts; if(acc>200) acc=200; while(acc>=DT){ gS.update(); acc-=DT; frameTick++; } render(); requestAnimationFrame(loop); }
requestAnimationFrame(ts=>{ last=ts; requestAnimationFrame(loop); });

// ─── DEBUG API ───────────────────────────────────────────────────────────────
if(new URLSearchParams(location.search).get('debug')==='1'){
  window.__marioDebug={
    getState:()=>({mario:{x:mario.x,y:mario.y,vx:mario.vx,vy:mario.vy,form:mario.form,onGnd:mario.onGnd,dead:mario.dead},score:gS.score,coins:gS.coins,lives:gS.lives,world:gS.world,lv:gS.lv,time:gS.time,phase:gS.phase,camX:camera.x,enemies:enemies.map(e=>({type:e.constructor.name,x:e.x,y:e.y,alive:e.alive}))}),
    teleport:(x,y)=>{ mario.x=x; mario.y=y; mario.vx=0; mario.vy=0; },
    skipToFlag:()=>{ mario.x=194*TILE; mario.y=5*TILE; camera.x=Math.max(0,mario.x-NW*.4); },
    fireForm:()=>{ mario.form='F'; },
    invincible:()=>{ mario.invT=mario.invT>0?0:600; },
  };
}
</script>
