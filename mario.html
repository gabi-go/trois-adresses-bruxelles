function resize() {
  const s = Math.min(window.innerWidth / NW, window.innerHeight / NH);

  canvas.style.height = Math.floor(NH * s) + 'px';

// ─── SPRITE SYSTEM ────────────────────────────────────────────────────────────
// Each sprite is { pixels: string[], pal: string[] }
// pixels: rows of hex chars (0=transparent, 1-f = palette index)
// pal: ['', color1, color2, ...] (index 0 unused = transparent)

function spr(s, sx, sy, flipH) {
  sx = Math.round(sx); sy = Math.round(sy);
  const rows = s.pixels, pal = s.pal;
  const pw = rows[0].length;
  for (let r = 0; r < rows.length; r++) {
    const row = rows[r];
    for (let c = 0; c < pw; c++) {
      const idx = parseInt(row[c], 16);
      if (!idx) continue;
      ctx.fillStyle = pal[idx];
      const px = flipH ? sx + (pw - 1 - c) : sx + c;
      ctx.fillRect(px, sy + r, 1, 1);
    }
  }
}

// ─── TILE IDs ─────────────────────────────────────────────────────────────────
const T = {
  AIR:0, SOLID:1, BRICK:2, QCOIN:3, QITEM:4, USED:5,
  PTOP_L:6, PTOP_R:7, PBOD_L:8, PBOD_R:9,
  FPOLE:10, FBASE:11, CASTLE:12,
};
function solid(id) {
  return id===T.SOLID||id===T.BRICK||id===T.QCOIN||id===T.QITEM||id===T.USED
      ||id===T.PTOP_L||id===T.PTOP_R||id===T.PBOD_L||id===T.PBOD_R
      ||id===T.FBASE||id===T.CASTLE;
}

// ─── TILE DRAWING ────────────────────────────────────────────────────────────
const C = {
  sky:'#5c94fc', ground:'#c84c0c', gTop:'#e88840', gLine:'#a83808',
  brick:'#c84c0c', bLine:'#a83808', bShine:'#e8a880',
  qMain:'#e8a000', qShine:'#f8d000', qDark:'#905800',
  used:'#9c6838', usedDark:'#704820',
  pipeG:'#009800', pipeL:'#00c800', pipeD:'#005800',
  pole:'#c0c0c0', flag:'#e82020', castle:'#b45030', castleD:'#803020',
};

const _blockOffsets = {};  // col*1000+row → bounce offset (px)
const _blockTimers  = {};

function hitBlockAnim(c,r) {
  const k = c*1000+r;
  _blockOffsets[k] = -4;
  _blockTimers[k]  = 12;
}
function updateBlockAnims() {
  for (const k of Object.keys(_blockTimers)) {
    _blockTimers[k]--;
    const t = _blockTimers[k];
    _blockOffsets[k] = t > 6 ? -4 + (6-t)*0.67 : (12-t)*0.33 - 4;
    if (_blockTimers[k] <= 0) { delete _blockTimers[k]; delete _blockOffsets[k]; }
  }
}
function blockOff(c,r) { return _blockOffsets[c*1000+r] || 0; }

function drawTile(id, sx, sy) {
  switch(id) {
    case T.SOLID:
      ctx.fillStyle = C.ground;
      ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle = C.gTop;
      ctx.fillRect(sx,sy,TILE,4);
      ctx.fillStyle = C.gLine;
      ctx.fillRect(sx,sy+4,TILE,1);
      for (let i=0;i<TILE;i+=8){ ctx.fillStyle=C.gLine; ctx.fillRect(sx+i,sy+5,1,TILE-5); }
      break;
    case T.BRICK: {
      ctx.fillStyle = C.brick; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle = C.bLine;
      ctx.fillRect(sx,sy+7,TILE,1);
      ctx.fillRect(sx+8,sy,1,7);
      ctx.fillRect(sx,sy+9,8,1);
      ctx.fillStyle = C.bShine;
      ctx.fillRect(sx,sy,TILE,1); ctx.fillRect(sx,sy,1,7);
      break;
    }
    case T.QCOIN:
    case T.QITEM: {
      ctx.fillStyle = C.qMain; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle = C.qShine;
      ctx.fillRect(sx+1,sy+1,TILE-2,2); ctx.fillRect(sx+1,sy+1,2,TILE-2);
      ctx.fillStyle = C.qDark;
      ctx.fillRect(sx+TILE-2,sy,2,TILE); ctx.fillRect(sx,sy+TILE-2,TILE,2);
      ctx.fillStyle='#fff';
      ctx.fillRect(sx+5,sy+3,5,2); ctx.fillRect(sx+8,sy+5,2,3);
      ctx.fillRect(sx+5,sy+7,5,2); ctx.fillRect(sx+6,sy+10,3,3);
      break;
    }
    case T.USED:
      ctx.fillStyle=C.used; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.usedDark; ctx.fillRect(sx+1,sy+1,TILE-2,TILE-2);
      ctx.fillStyle='#c09868';
      for(let r=3;r<TILE;r+=4) ctx.fillRect(sx+2,sy+r,TILE-4,1);
      break;
    case T.PTOP_L:
      ctx.fillStyle=C.pipeG; ctx.fillRect(sx,sy+4,TILE,TILE-4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy+4,4,TILE-4);
      ctx.fillStyle=C.pipeD; ctx.fillRect(sx+TILE-2,sy+4,2,TILE-4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx-2,sy,TILE+2,6);
      ctx.fillStyle=C.pipeG; ctx.fillRect(sx,sy+2,TILE,4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy+2,4,4);
      break;
    case T.PTOP_R:
      ctx.fillStyle=C.pipeG; ctx.fillRect(sx,sy+4,TILE,TILE-4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy+4,4,TILE-4);
      ctx.fillStyle=C.pipeD; ctx.fillRect(sx+TILE-2,sy+4,2,TILE-4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy,TILE+2,6);
      ctx.fillStyle=C.pipeG; ctx.fillRect(sx,sy+2,TILE,4);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy+2,4,4);
      break;
    case T.PBOD_L: case T.PBOD_R:
      ctx.fillStyle=C.pipeG; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.pipeL; ctx.fillRect(sx,sy,4,TILE);
      ctx.fillStyle=C.pipeD; ctx.fillRect(sx+TILE-2,sy,2,TILE);
      break;
    case T.FPOLE:
      ctx.fillStyle=C.pole; ctx.fillRect(sx+7,sy,2,TILE); break;
    case T.FBASE:
      ctx.fillStyle=C.pole; ctx.fillRect(sx+4,sy,8,TILE); break;
    case T.CASTLE:
      ctx.fillStyle=C.castle; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle=C.castleD;
      ctx.fillRect(sx,sy+7,TILE,2);
      ctx.fillRect(sx+8,sy,1,7);
      ctx.fillRect(sx,sy+9,8,1);
      break;
  }
}

// ─── TILEMAP ─────────────────────────────────────────────────────────────────
class TileMap {
  constructor(data,w,h){ this.data=data; this.w=w; this.h=h; }
  get(c,r){
    if(c<0||r<0||c>=this.w||r>=this.h) return r>=this.h?T.SOLID:T.AIR;
    return this.data[r*this.w+c];
  }
  set(c,r,id){ if(c>=0&&c<this.w&&r>=0&&r<this.h) this.data[r*this.w+c]=id; }
  draw(camX){
    const c0=Math.max(0,Math.floor(camX/TILE));
    const c1=Math.min(this.w-1,c0+17);
    for(let c=c0;c<=c1;c++){
      for(let r=0;r<this.h;r++){
        const id=this.get(c,r); if(!id) continue;
        const off = blockOff(c,r);
        drawTile(id, c*TILE-camX, r*TILE+off);
      }
    }
  }
}

// ─── WORLD 1-1 ────────────────────────────────────────────────────────────────
function buildLevel11() {
  const W=212,H=15;
  const d=new Uint8Array(W*H);
  function s(c,r,id){ if(c>=0&&c<W&&r>=0&&r<H) d[r*W+c]=id; }
  function row(c1,c2,r,id){ for(let c=c1;c<=c2;c++) s(c,r,id); }
  function col(r1,r2,c,id){ for(let r=r1;r<=r2;r++) s(c,r,id); }

  // Ground rows 13-14 continuous
  row(0,W-1,13,T.SOLID); row(0,W-1,14,T.SOLID);

  // First ? / brick section
  s(16,8,T.QITEM); s(17,8,T.BRICK); s(18,8,T.QCOIN);
  s(19,8,T.BRICK); s(20,8,T.QITEM); s(21,8,T.BRICK); s(22,8,T.BRICK);

  // Elevated bricks + star
  row(24,29,4,T.BRICK); s(27,4,T.QITEM);

  // Pipes
  s(28,11,T.PTOP_L); s(29,11,T.PTOP_R); s(28,12,T.PBOD_L); s(29,12,T.PBOD_R);
  s(38,10,T.PTOP_L); s(39,10,T.PTOP_R); s(38,11,T.PBOD_L); s(39,11,T.PBOD_R); s(38,12,T.PBOD_L); s(39,12,T.PBOD_R);
  s(46,9,T.PTOP_L);  s(47,9,T.PTOP_R);  s(46,10,T.PBOD_L); s(47,10,T.PBOD_R); s(46,11,T.PBOD_L); s(47,11,T.PBOD_R); s(46,12,T.PBOD_L); s(47,12,T.PBOD_R);
  s(57,9,T.PTOP_L);  s(58,9,T.PTOP_R);  s(57,10,T.PBOD_L); s(58,10,T.PBOD_R); s(57,11,T.PBOD_L); s(58,11,T.PBOD_R); s(57,12,T.PBOD_L); s(58,12,T.PBOD_R);

  // Elevated brick platforms
  row(64,68,10,T.BRICK); s(65,10,T.QCOIN); s(67,10,T.QITEM);
  row(77,82,8,T.BRICK); s(79,8,T.QCOIN); s(81,8,T.QITEM);
  s(88,8,T.QITEM); row(89,94,4,T.BRICK);
  row(93,101,8,T.BRICK); s(96,8,T.QITEM); s(100,8,T.QCOIN);

  // Staircase up
  for(let i=0;i<4;i++){ col(12-i,12,104+i*2,T.SOLID); col(12-i,12,105+i*2,T.SOLID); }
  // Staircase down

  row(130,134,4,T.BRICK); s(140,8,T.QITEM); s(143,4,T.QITEM);

  s(202,9,T.AIR); s(209,9,T.AIR);

  // Enemy spawn definitions (returned separately)
  const spawns = [
    { type:'goomba', col:22, row:12 },

}

// ─── PHYSICS ────────────────────────────────────────────────────────────────
const P = {
  walkAccel:0.037109375, runAccel:0.05615234375,
  releaseDecel:0.031982421875, skidDecel:0.05,
  maxWalk:1.5625, maxRun:2.5,
  gravity:0.1875, gravityHold:0.06640625,
  jumpVelWalk:4.0, jumpVelMid:4.5, jumpVelRun:5.0,
  maxFall:5.0,
};

// ─── PARTICLES ───────────────────────────────────────────────────────────────
const particles = [];

function spawnCoinAnim(x,y){
  particles.push({type:'coin',x:x+8,y,vy:-4.5,life:50});
}
function spawnScore(x,y,val){
  particles.push({type:'score',x,y,vy:-0.8,life:55,val});
}
function spawnBrickBreak(x,y){
  for(let i=0;i<4;i++){
    particles.push({
      type:'brick',x:x+8,y:y+8,
      vx:(i<2?-2:2)+(Math.random()-.5),
      vy:-4-Math.random()*2,life:40
    });
  }
}
function spawnDust(x,y,n=3){
  for(let i=0;i<n;i++){
    particles.push({
      type:'dust',x,y,
      vx:(Math.random()-.5)*1.5,vy:-Math.random()*1.5,
      life:15+Math.random()*10|0
    });
  }
}
function spawnStomp(x,y){
  for(let i=0;i<5;i++){
    const a = (i/5)*Math.PI;
    particles.push({type:'stomp',x,y,vx:Math.cos(a)*2,vy:-Math.sin(a)*2,life:20});
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life--;
    if(p.life<=0){ particles.splice(i,1); continue; }
    switch(p.type){
      case 'coin':  p.y+=p.vy; p.vy+=0.3; break;
      case 'score': p.y+=p.vy; break;
      case 'brick': p.x+=p.vx; p.y+=p.vy; p.vy+=0.35; break;
      case 'dust':  p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; break;
      case 'stomp': p.x+=p.vx; p.y+=p.vy; break;
    }
  }
}

function drawParticles(camX){
  for(const p of particles){
    const sx=p.x-camX;
    if(sx<-20||sx>NW+20) continue;
    switch(p.type){
      case 'coin': spr(SPR.coin,sx-4,p.y); break;
      case 'score':
        ctx.fillStyle='#fff'; ctx.font='bold 7px monospace';
        ctx.fillText(p.val,sx-8,p.y); break;
      case 'brick':
        ctx.fillStyle=C.brick; ctx.fillRect(sx-3,p.y-3,6,6); break;
      case 'dust':
        ctx.fillStyle=`rgba(200,160,80,${p.life/25})`;
        ctx.fillRect(sx-2,p.y-2,4,4); break;
      case 'stomp':
        ctx.fillStyle=`rgba(255,255,255,${p.life/20})`;
        ctx.fillRect(sx-2,p.y-2,4,4); break;
    }
  }
}

// ─── WORLD OBJECTS (items) ────────────────────────────────────────────────────
const worldObjects = [];

function spawnMushroom(x,y,dir){
  worldObjects.push({type:'mushroom',x,y,vx:dir,vy:0,w:14,h:14,alive:true,emerging:8,emergeY:y});
}
function spawnFlower(x,y){
  worldObjects.push({type:'flower',x,y,vx:0,vy:0,w:12,h:16,alive:true,emerging:16,emergeY:y});
}
function spawnStar(x,y){
  worldObjects.push({type:'star',x,y,vx:2,vy:-4,w:14,h:14,alive:true});
}

function updateObjects(tm){
  for(let i=worldObjects.length-1;i>=0;i--){
    const o=worldObjects[i];
    if(!o.alive){ worldObjects.splice(i,1); continue; }

    // Emerging from block
    if(o.emerging>0){
      o.y--; o.emerging--;
      continue;
    }

    if(o.type==='flower') continue; // flowers stay put

    // Gravity
    o.vy=Math.min(o.vy+P.gravity, P.maxFall);

    // Horizontal
    o.x+=o.vx;
    const midR=Math.floor((o.y+o.h/2)/TILE);
    if(o.vx>0){
      const c=Math.floor((o.x+o.w)/TILE);
      if(solid(tm.get(c,midR))) o.vx=-Math.abs(o.vx);
    } else if(o.vx<0){
      const c=Math.floor(o.x/TILE);
      if(solid(tm.get(c,midR))) o.vx=Math.abs(o.vx);
    }

    // Vertical
    o.y+=o.vy;
    const botR=Math.floor((o.y+o.h)/TILE);
    const lc=Math.floor((o.x+1)/TILE), rc=Math.floor((o.x+o.w-1)/TILE);
    for(let c=lc;c<=rc;c++){
      if(solid(tm.get(c,botR))){
        o.y=botR*TILE-o.h; o.vy=0;
        if(o.type==='star') o.vy=-3.5; // star bounces
        break;
      }
    }
    // Edge reversal for mushroom
    if(o.type==='mushroom'&&o.vy===0){
      const frontC=o.vx>0?Math.floor((o.x+o.w)/TILE):Math.floor((o.x-1)/TILE);
      if(!solid(tm.get(frontC,Math.floor((o.y+o.h)/TILE)))) o.vx=-o.vx;
    }
  }
}

function drawObjects(camX){
  for(const o of worldObjects){
    if(!o.alive) continue;
    const sx=o.x-camX;
    switch(o.type){
      case 'mushroom': spr(SPR.mushroom,sx,o.y); break;
      case 'flower':   spr(SPR.flower,  sx,o.y); break;
      case 'star':     spr(SPR.star,    sx,o.y); break;
    }
  }
}

// ─── ENEMIES ─────────────────────────────────────────────────────────────────
class Enemy {
  constructor(x,y,w,h){ this.x=x; this.y=y; this.w=w; this.h=h; this.alive=true; this.vx=0; this.vy=0; }
  get left(){ return this.x; }
  get right(){ return this.x+this.w; }
  get top(){ return this.y; }
  get bottom(){ return this.y+this.h; }
  moveAndCollide(tm){
    this.x+=this.vx;
    if(this.vx>0){
      const c=Math.floor((this.x+this.w)/TILE);
      for(let r=Math.floor((this.y+1)/TILE);r<=Math.floor((this.y+this.h-1)/TILE);r++){
        if(solid(tm.get(c,r))){ this.x=c*TILE-this.w; this.vx=-this.vx; break; }
      }
    } else if(this.vx<0){
      const c=Math.floor(this.x/TILE);
      for(let r=Math.floor((this.y+1)/TILE);r<=Math.floor((this.y+this.h-1)/TILE);r++){
        if(solid(tm.get(c,r))){ this.x=(c+1)*TILE; this.vx=-this.vx; break; }
      }
    }
    this.vy=Math.min(this.vy+P.gravity,P.maxFall);
    this.y+=this.vy;
    const botR=Math.floor((this.y+this.h)/TILE);
    const lc=Math.floor((this.x+1)/TILE),rc=Math.floor((this.x+this.w-1)/TILE);
    let grounded=false;
    for(let c=lc;c<=rc;c++){
      if(solid(tm.get(c,botR))){ this.y=botR*TILE-this.h; this.vy=0; grounded=true; break; }
    }
    // Reverse at ledge
    if(grounded){
      const ahead=this.vx>0?Math.floor((this.x+this.w)/TILE):Math.floor((this.x-1)/TILE);
      if(!solid(tm.get(ahead,botR))) this.vx=-this.vx;
    }
    // Fell off level
    if(this.y>NH+32) this.alive=false;
  }
}

class Goomba extends Enemy {
  constructor(x,y){
    super(x,y,14,14);
    this.vx=-0.8;
    this.frame=0;
    this.frameTimer=0;
    this.squished=false;
    this.squishTimer=0;
    this.dying=false;  // dying = flipped off screen
    this.dyingVy=0;
  }
  update(tm){
    if(!this.alive) return;
    if(this.dying){ this.y+=this.dyingVy; this.dyingVy+=0.3; if(this.y>NH+32) this.alive=false; return; }
    if(this.squished){ this.squishTimer--; if(this.squishTimer<=0) this.alive=false; return; }
    this.moveAndCollide(tm);
    this.frameTimer++;
    if(this.frameTimer>=14){ this.frameTimer=0; this.frame^=1; }
  }
  stomp(gs){
    this.squished=true;
    this.squishTimer=25;
    this.y+=8;
    gs.addScore(100);
    spawnScore(this.x,this.y,100);
    spawnStomp(this.x+8,this.y+4);
    gs.sound('stomp');
  }
  hitFromSide(){
    // Kicked by shell — fly off
    this.dying=true; this.dyingVy=-3; this.alive=true;
  }
  draw(camX){
    if(!this.alive) return;
    const sx=this.x-camX;
    if(this.squished){
      spr(SPR.goombaSq,sx-1,this.y+4);
    } else {
      spr(this.frame===0?SPR.goomba1:SPR.goomba2, sx-1, this.y-2);
    }
  }
}

class Koopa extends Enemy {
  constructor(x,y){
    super(x,y,14,22);
    this.vx=-0.9;
    this.frame=0;
    this.frameTimer=0;
    this.shelled=false;   // in shell
    this.shellSliding=false;
    this.shellTimer=0;    // how long shell sat still (respawn)
    this.facingR=false;
  }
  update(tm){
    if(!this.alive) return;
    if(this.shelled && !this.shellSliding){
      // Shell sits still, timer to respawn
      this.shellTimer++;
      if(this.shellTimer>300){ this.shelled=false; this.shellSliding=false; this.vx=-0.9; }
      return;
    }
    this.facingR = this.vx>0;
    this.moveAndCollide(tm);
    if(!this.shelled){
      this.frameTimer++;
      if(this.frameTimer>=16){ this.frameTimer=0; this.frame^=1; }
    }
  }
  stomp(gs){
    if(!this.shelled){
      this.shelled=true;
      this.shellSliding=false;
      this.vx=0;
      this.h=14;
      this.y+=8;
      this.shellTimer=0;
      gs.addScore(100);
      spawnScore(this.x,this.y,100);
      gs.sound('stomp');
    } else if(!this.shellSliding){
      // Kick the shell
      this.shellSliding=true;
      this.vx = gs.mario.x < this.x ? 4 : -4;
      gs.sound('kick');
    } else {
      // Stop shell
      this.shellSliding=false; this.vx=0;
    }
  }
  draw(camX){
    if(!this.alive) return;
    const sx=this.x-camX;
    if(this.shelled){
      spr(SPR.koopaShell,sx-1,this.y-8);
    } else {
      const s=this.frame===0?SPR.koopa1:SPR.koopa2;
      spr(s,sx-1,this.y-2,!this.facingR);
    }
  }
}

// ─── FIREBALLS ────────────────────────────────────────────────────────────────
const fireballs = [];
function spawnFireball(x,y,dir){
  fireballs.push({x,y,vx:dir*4,vy:-2,alive:true,bounce:0});
}
function updateFireballs(tm){
  for(let i=fireballs.length-1;i>=0;i--){
    const f=fireballs[i];
    if(!f.alive){ fireballs.splice(i,1); continue; }
    f.vy+=P.gravity;
    f.x+=f.vx; f.y+=f.vy;
    // Wall
    const c=f.vx>0?Math.floor((f.x+8)/TILE):Math.floor(f.x/TILE);
    if(solid(tm.get(c,Math.floor((f.y+4)/TILE)))){ f.alive=false; }
    // Floor bounce
    const botR=Math.floor((f.y+8)/TILE);
    if(solid(tm.get(Math.floor((f.x+4)/TILE),botR))){
      f.y=botR*TILE-8; f.vy=-3; f.bounce++;
      if(f.bounce>5) f.alive=false;
    }
    if(f.x<-16||f.x>tilemap.w*TILE+16) f.alive=false;
  }
}
function drawFireballs(camX){
  for(const f of fireballs){
    if(!f.alive) continue;
    spr(SPR.fireball,f.x-camX,f.y);
  }
}

// ─── MARIO ───────────────────────────────────────────────────────────────────
class Mario {
  constructor(x,y){
    this.x=x; this.y=y; this.vx=0; this.vy=0;
    this.onGround=false; this.facingR=true;
    this.form='SMALL';   // SMALL | SUPER | FIRE
    this.jumping=false; this.crouching=false;
    this.dead=false; this.deadVy=0; this.deadTimer=0;
    this.invTimer=0; this.hitTimer=0;
    this.skidding=false;
    this.growing=false; this.growTimer=0; this.growPhase=0;
    this.onPole=false; this.poleVy=1.5;
    this.wasOnGround=false;
    this.walkFrame=0; this.walkTimer=0;
    this.fireTimer=0;  // cooldown between fireballs
    this._prevY=y;
    this.stompCombo=0; this.stompComboReset=0;
  }
  get w(){ return this.form==='SMALL' ? 12 : 14; }
  get h(){
    if(this.crouching) return this.form==='SMALL'?12:16;
    return this.form==='SMALL'?16:24;
  }
  get left(){ return this.x; }
  get right(){ return this.x+this.w; }
  get top(){ return this.y; }
  get bottom(){ return this.y+this.h; }

  update(tm,gs){
    if(this.dead){ this._updateDead(gs); return; }
    if(this.onPole){ this._updatePole(tm,gs); return; }
    if(this.growing){ this._updateGrow(); return; }

    const run=RUN(), left=LEFT(), right=RIGHT(), down=DOWN(), jump=JUMP();
    this.wasOnGround=this.onGround;
    this.crouching=down && this.form!=='SMALL' && this.onGround;

    // Horizontal
    const maxSpd=run?P.maxRun:P.maxWalk;
    const accel=run?P.runAccel:P.walkAccel;
    if(!this.crouching){
      if(right&&!left){
        this.facingR=true;
        this.skidding=this.vx<-0.1;
        if(this.vx<maxSpd) this.vx=Math.min(this.vx+accel,maxSpd);
        else if(this.vx>maxSpd) this.vx=Math.max(this.vx-P.skidDecel,maxSpd);
      } else if(left&&!right){
        this.facingR=false;
        this.skidding=this.vx>0.1;
        if(this.vx>-maxSpd) this.vx=Math.max(this.vx-accel,-maxSpd);
        else if(this.vx<-maxSpd) this.vx=Math.min(this.vx+P.skidDecel,-maxSpd);
      } else {
        this.skidding=false;
        if(this.vx>0) this.vx=Math.max(0,this.vx-P.releaseDecel);
        else if(this.vx<0) this.vx=Math.min(0,this.vx+P.releaseDecel);
      }
    }

    // Jump
    if(jump&&this.onGround&&!this.crouching){
      const spd=Math.abs(this.vx);
      this.vy=-(spd>=P.maxRun*0.6?P.jumpVelRun:spd>=P.maxWalk*0.5?P.jumpVelMid:P.jumpVelWalk);
      this.onGround=false; this.jumping=true;
      spawnDust(this.x+this.w/2, this.y+this.h);
      gs.sound('jump');
    }
    if(!jump) this.jumping=false;

    // Gravity
    this.vy=Math.min(this.vy+((this.jumping&&this.vy<0)?P.gravityHold:P.gravity),P.maxFall);

    // Collide
    this._prevY=this.y;
    this._moveX(tm);
    this._moveY(tm,gs);

    // Left boundary
    if(this.x<0){ this.x=0; this.vx=0; }

    // Walk animation
    if(this.onGround&&Math.abs(this.vx)>0.1){
      this.walkTimer++;
      const speed=Math.abs(this.vx)/P.maxRun;
      const period=Math.max(4,Math.round(12*(1-speed*0.7)));
      if(this.walkTimer>=period){ this.walkTimer=0; this.walkFrame=(this.walkFrame+1)%4; }
    } else if(!this.onGround){ this.walkFrame=4; } // jump frame
    else { this.walkFrame=0; this.walkTimer=0; }

    // Landing dust
    if(!this.wasOnGround&&this.onGround){ spawnDust(this.x+this.w/2,this.y+this.h,4); }

    // Fireball
    if(this.fireTimer>0) this.fireTimer--;
    if(this.form==='FIRE'&&RUN()&&this.fireTimer===0){
      spawnFireball(this.x+(this.facingR?this.w:0), this.y+8, this.facingR?1:-1);
      this.fireTimer=20;
      gs.sound('fireball');
    }

    if(this.hitTimer>0) this.hitTimer--;
    if(this.invTimer>0) this.invTimer--;

    // Flagpole
    const poleCol=198;
    if(this.right>=poleCol*TILE+4&&!this.onPole&&this.y>2*TILE&&gState.phase==='PLAYING'){
      this.onPole=true; this.x=poleCol*TILE+1; this.vx=0; this.vy=0; this.onGround=false;
      gs.sound('flagpole');
    }

    // Stomp combo reset
    if(this.onGround){ this.stompCombo=0; }
    if(this.stompComboReset>0){ this.stompComboReset--; if(this.stompComboReset===0) this.stompCombo=0; }
  }

  _updateDead(gs){
    if(this.deadTimer===0){ this.deadVy=-6; }
    this.deadTimer++;
    this.deadVy+=0.25;
    this.y+=this.deadVy;
    if(this.deadTimer>180) gs._finishDeath();
  }
  _updatePole(tm,gs){
    this.y+=this.poleVy; this.poleVy=Math.min(this.poleVy+0.12,3.5);
    if(this.y>=13*TILE-this.h){
      this.y=13*TILE-this.h; this.onPole=false; this.onGround=true;
      gs.triggerLevelClear();
    }
  }
  _updateGrow(){
    this.growTimer--;
    this.growPhase=Math.floor(this.growTimer/6)%2;
    if(this.growTimer<=0){ this.growing=false; }
  }

  _moveX(tm){
    this.x+=this.vx;
    if(this.vx>0){
      const c=Math.floor((this.x+this.w)/TILE);
      for(let r=Math.floor((this.y+1)/TILE);r<=Math.floor((this.y+this.h-1)/TILE);r++){
        if(solid(tm.get(c,r))){ this.x=c*TILE-this.w; this.vx=0; break; }
      }
    } else if(this.vx<0){
      const c=Math.floor(this.x/TILE);
      for(let r=Math.floor((this.y+1)/TILE);r<=Math.floor((this.y+this.h-1)/TILE);r++){
        if(solid(tm.get(c,r))){ this.x=(c+1)*TILE; this.vx=0; break; }
      }
    }
  }
  _moveY(tm,gs){
    this.y+=this.vy;
    if(this.vy>=0){
      const r=Math.floor((this.y+this.h)/TILE);
      let landed=false;
      for(let c=Math.floor((this.x+1)/TILE);c<=Math.floor((this.x+this.w-1)/TILE);c++){
        if(solid(tm.get(c,r))){ this.y=r*TILE-this.h; this.vy=0; this.onGround=true; this.jumping=false; landed=true; break; }
      }
      if(!landed) this.onGround=false;
    } else {
      this.onGround=false;
      const r=Math.floor(this.y/TILE);
      for(let c=Math.floor((this.x+1)/TILE);c<=Math.floor((this.x+this.w-1)/TILE);c++){
        if(solid(tm.get(c,r))){
          this.y=(r+1)*TILE; this.vy=0; this.jumping=false;
          this._hitBlock(tm,c,r,tm.get(c,r),gs); break;
        }
      }
    }
  }

  _hitBlock(tm,c,r,id,gs){
    hitBlockAnim(c,r);
    if(id===T.QCOIN||id===T.QITEM){
      tm.set(c,r,T.USED);
      if(id===T.QCOIN){
        gs.addCoins(1); spawnCoinAnim(c*TILE,r*TILE); spawnScore(c*TILE+4,r*TILE,200); gs.sound('coin');
      } else {
        if(this.form==='SMALL'){
          spawnMushroom(c*TILE+1,(r-1)*TILE,this.facingR?1:-1);
        } else {
          spawnFlower(c*TILE+2,(r-1)*TILE);
        }
        gs.sound('powerup_appear');
      }
    } else if(id===T.BRICK){
      if(this.form!=='SMALL'){
        tm.set(c,r,T.AIR);
        spawnBrickBreak(c*TILE,r*TILE);
        gs.addScore(50); gs.sound('brick_break');
      } else {
        gs.sound('bump');
      }
    }
  }

  hit(gs){
    if(this.invTimer>0||this.hitTimer>0||this.dead) return;
    if(this.form!=='SMALL'){
      this.form='SMALL'; this.y+=8;
      this.hitTimer=120; gs.sound('damage');
    } else {
      this.die(gs);
    }
  }
  die(gs){
    if(this.dead) return;
    this.dead=true; this.deadTimer=0; this.deadVy=-6;
    gs.sound('death'); gs.onMarioDeath();
  }

  stompEnemy(gs){
    const SCORES=[100,200,400,800,1000,2000,4000,8000];
    this.stompCombo=Math.min(this.stompCombo+1,7);
    return SCORES[this.stompCombo];
  }

  draw(camX){
    if(this.dead){ this._drawSprite(camX,true); return; }
    if(this.growing&&this.growPhase===1) return;
    if(this.hitTimer>0&&Math.floor(this.hitTimer/4)%2!==0) return;
    if(this.invTimer>0&&Math.floor(this.invTimer/3)%2!==0) return;
    this._drawSprite(camX,false);
  }

  _drawSprite(camX, flip){
    const sx=Math.round(this.x-camX);
    const sy=Math.round(this.y);
    const flipH=!this.facingR;

    let s;
    if(this.dead){
      s = SPR.ms_die; // death spin
    } else if(this.form==='SMALL'){
      if(this.crouching) s=SPR.ms_stand;
      else if(!this.onGround) s=SPR.ms_jump;
      else {
        const frames=[SPR.ms_stand,SPR.ms_walk1,SPR.ms_walk3,SPR.ms_walk2];
        s=frames[this.walkFrame%4];
      }
    } else {
      const prefix = this.form==='FIRE' ? 'mf' : 'mb';
      if(this.crouching) s=SPR[prefix+'_crouch'];
      else if(!this.onGround) s=SPR[prefix+'_jump'];
      else {
        const frames=[SPR[prefix+'_stand'],SPR[prefix+'_walk1'],SPR[prefix+'_stand'],SPR[prefix+'_walk2']];
        s=frames[this.walkFrame%4];
      }
    }

    // Skid marker
    if(this.skidding&&this.onGround){
      ctx.fillStyle='rgba(255,255,200,0.7)';
      ctx.fillRect(sx+(flipH?this.w:0)-2,sy+this.h-2,4,2);
    }

    spr(s, sx, sy, flipH);

    // Star sparkle overlay
    if(this.invTimer>0&&Math.floor(Date.now()/100)%3===0){
      ctx.fillStyle='rgba(255,255,0,0.5)';
      ctx.fillRect(sx,sy,this.w,this.h);
    }
  }
}

// ─── CAMERA ──────────────────────────────────────────────────────────────────
class Camera {
  constructor(){ this.x=0; }
  follow(mario,levelW){
    const target=mario.x-NW*0.40;
    this.x=Math.max(this.x,Math.min(target,levelW*TILE-NW));
    this.x=Math.max(0,this.x);
  }
}

// ─── SOUND ENGINE ─────────────────────────────────────────────────────────────
class SoundEngine {
  constructor(){ this.ac=null; this.muted=false; document.addEventListener('keydown',()=>this._init(),{once:true}); }
  _init(){ if(this.ac) return; this.ac=new(window.AudioContext||window.webkitAudioContext)(); }
  _beep(freq,dur,type='square',vol=0.15,delay=0){
    if(!this.ac||this.muted) return;
    const t=this.ac.currentTime+delay;
    const o=this.ac.createOscillator(), g=this.ac.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(this.ac.destination);
    o.start(t); o.stop(t+dur+0.01);
  }
  play(name){
    if(!this.ac) return;
    switch(name){
      case 'jump':          this._beep(400,.08); this._beep(600,.07,undefined,.13,.06); break;
      case 'coin':          this._beep(988,.06); this._beep(1319,.1,undefined,.12,.06); break;
      case 'brick_break':   this._beep(200,.05,'sawtooth',.2); this._beep(150,.1,'sawtooth',.1,.05); break;
      case 'bump':          this._beep(180,.07,'square',.18); break;
      case 'powerup_appear':this._beep(600,.08); this._beep(800,.08,undefined,.12,.08); break;
      case 'powerup':       for(let i=0;i<5;i++) this._beep(400+i*100,.06,undefined,.12,i*.06); break;
      case 'damage':        for(let i=0;i<3;i++) this._beep(440-i*80,.1,'sawtooth',.2,i*.12); break;
      case 'death':         this._beep(440,.15,'sawtooth',.3); this._beep(200,.5,'sawtooth',.2,.15); break;
      case 'stomp':         this._beep(300,.06,'square',.2); break;
      case 'kick':          this._beep(250,.08,'square',.25); break;
      case 'flagpole':      for(let i=0;i<8;i++) this._beep(300+i*50,.08,undefined,.12,i*.07); break;
      case 'fireball':      this._beep(600,.04,'square',.1); this._beep(400,.04,'square',.05,.04); break;
      case '1up':           for(let i=0;i<6;i++) this._beep([523,659,784,659,784,1047][i],.08,undefined,.15,i*.08); break;
    }
  }
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
const gState = {
  phase:'WORLD_INTRO',
  score:0, coins:0, lives:3, world:1, level:1,
  timeLeft:400, _timeAcc:0, _introTimer:120,
  _clearTimer:0, _gameOverTimer:0,
  mario:null,

  sound(n){ sfx.play(n); },
  addScore(n){ this.score+=n; },
  addCoins(n){
    this.coins++;  this.score+=200;
    if(this.coins>=100){ this.coins=0; this.lives++; sfx.play('1up'); }
  },
  triggerLevelClear(){
    this.phase='LEVEL_CLEAR'; this._clearTimer=300;
  },
  onMarioDeath(){
    this.phase='MARIO_DEAD';
  },
  _finishDeath(){
    this.lives--;
    if(this.lives<=0){ this.phase='GAME_OVER'; this._gameOverTimer=300; }
    else this._respawn();
  },

  update(){
    if(this.phase==='WORLD_INTRO'){
      this._introTimer--;
      if(this._introTimer<=0) this.phase='PLAYING';
      return;
    }
    if(this.phase==='MARIO_DEAD'){
      mario.update(tilemap,this);
      return;
    }
    if(this.phase==='GAME_OVER'){
      this._gameOverTimer--;
      if(this._gameOverTimer<=0) this._resetGame();
      return;
    }
    if(this.phase==='LEVEL_CLEAR'){
      mario.update(tilemap,this);
      this._clearTimer--;
      if(this._clearTimer<=0) this._nextLevel();
      return;
    }

    // PLAYING
    this._timeAcc++;
    if(this._timeAcc>=40){ this._timeAcc=0; this.timeLeft=Math.max(0,this.timeLeft-1); if(this.timeLeft===0) mario.die(this); }

    mario.update(tilemap,this);
    updateObjects(tilemap);
    updateParticles();
    updateBlockAnims();
    updateFireballs(tilemap);

    // Enemy update
    for(const e of enemies) e.update(tilemap);

    // Mario fell
    if(mario.y>NH+64) mario.die(this);

    // Enemy collision
    for(const e of enemies){
      if(!e.alive) continue;
      if(mario.right>e.left&&mario.left<e.right&&mario.bottom>e.top&&mario.top<e.bottom){
        const stomp=mario.vy>0.5&&mario.bottom<e.top+e.h*0.55;
        if(stomp){
          e.stomp(this);
          const pts=mario.stompEnemy(this);
          spawnScore(e.x,e.y,pts);
          mario.vy=-3.5;
          mario.stompComboReset=30;
        } else {
          mario.hit(this);
        }
      }
    }

    // Fireball vs enemy
    for(const f of fireballs){
      if(!f.alive) continue;
      for(const e of enemies){
        if(!e.alive) continue;
        if(f.x+8>e.left&&f.x<e.right&&f.y+8>e.top&&f.y<e.bottom){
          f.alive=false;
          if(e instanceof Goomba) e.hitFromSide();
          else if(e instanceof Koopa&&!e.shelled) e.hitFromSide();
          this.addScore(200); spawnScore(e.x,e.y,200);
        }
      }
    }

    // Object pickup
    for(const o of worldObjects){
      if(!o.alive||o.emerging>0) continue;
      if(mario.right>o.x&&mario.left<o.x+o.w&&mario.bottom>o.y&&mario.top<o.y+o.h){
        o.alive=false;
        switch(o.type){
          case 'mushroom':
            if(mario.form==='SMALL'){ mario.form='SUPER'; mario.y-=8; mario.growing=true; mario.growTimer=48; }
            this.addScore(1000); spawnScore(o.x,o.y,1000); sfx.play('powerup'); break;
          case 'flower':
            if(mario.form!=='FIRE'){ mario.form='FIRE'; mario.growing=true; mario.growTimer=48; }
            this.addScore(1000); spawnScore(o.x,o.y,1000); sfx.play('powerup'); break;
          case 'star':
            mario.invTimer=600; this.addScore(1000); spawnScore(o.x,o.y,1000); sfx.play('powerup'); break;
        }
      }
    }

    camera.follow(mario,tilemap.w);
  },

  _respawn(){
    const ld=buildLevel11();
    tilemap.data=ld.data;
    enemies.length=0;
    for(const sp of ld.spawns){
      if(sp.type==='goomba') enemies.push(new Goomba(sp.col*TILE, sp.row*TILE));
      if(sp.type==='koopa')  enemies.push(new Koopa(sp.col*TILE,  sp.row*TILE));
    }
    worldObjects.length=0; particles.length=0; fireballs.length=0;
    mario.x=3*TILE; mario.y=11*TILE;
    mario.vx=0; mario.vy=0; mario.dead=false; mario.deadTimer=0;
    mario.form='SMALL'; mario.onGround=false;
    mario.hitTimer=0; mario.invTimer=0; mario.onPole=false;
    mario.walkFrame=0; mario.walkTimer=0;
    camera.x=0;
    this.timeLeft=400; this._timeAcc=0; this._introTimer=90;
    this.phase='WORLD_INTRO';
  },
  _nextLevel(){ this._respawn(); },
  _resetGame(){
    this.score=0; this.coins=0; this.lives=3; this.world=1; this.level=1;
    this._respawn();
  },
};

// ─── HUD ────────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='#fff'; ctx.font='bold 8px monospace';
  ctx.fillText('MARIO',16,10);
  ctx.fillText(String(gState.score).padStart(6,'0'),16,20);
  ctx.fillStyle='#f8c000'; spr(SPR.coin,80,8);
  ctx.fillStyle='#fff'; ctx.fillText('×'+String(gState.coins).padStart(2,'0'),90,20);
  ctx.fillText('WORLD',120,10); ctx.fillText(`${gState.world}-${gState.level}`,126,20);
  ctx.fillText('TIME',168,10);
  const urgency=gState.timeLeft<100&&Math.floor(Date.now()/300)%2;
  ctx.fillStyle=urgency?'#f88':'#fff';
  ctx.fillText(String(Math.ceil(gState.timeLeft)).padStart(3,'0'),168,20);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='6px monospace';
  ctx.fillText(`♥ ${gState.lives}  M=mute  F=fire`,4,NH-4);
}

// ─── OVERLAYS ─────────────────────────────────────────────────────────────────
function drawWorldIntro(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,NW,NH);
  ctx.fillStyle='#fff'; ctx.font='bold 10px monospace';
  ctx.textAlign='center';
  ctx.fillText(`WORLD ${gState.world}-${gState.level}`,NW/2,NH/2-14);
  // mario icon
  spr(SPR.ms_stand,NW/2-24,NH/2-4);
  ctx.fillText(`× ${gState.lives}`,NW/2,NH/2+12);
  ctx.textAlign='left';
}
function drawGameOver(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,NW,NH);
  ctx.fillStyle='#fff'; ctx.font='bold 14px monospace';
  ctx.textAlign='center';
  ctx.fillText('GAME OVER',NW/2,NH/2);
  ctx.textAlign='left';
}
function drawLevelClear(){
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,NW,32);
  ctx.fillStyle='#fff'; ctx.font='bold 8px monospace';
  ctx.textAlign='center';
  ctx.fillText('COURSE CLEAR!',NW/2,14);
  ctx.fillText('SCORE  '+String(gState.score).padStart(6,'0'),NW/2,25);
  ctx.textAlign='left';
}

// ─── SCENERY ─────────────────────────────────────────────────────────────────
function drawScenery(camX){
  const clouds=[
    {x:48,y:42},{x:128,y:34},{x:208,y:46},{x:320,y:36},
    {x:416,y:42},{x:528,y:38},{x:640,y:44},{x:768,y:36},{x:896,y:42},
  ];
  for(const cl of clouds){
    const sx=cl.x-camX*0.5;
    if(sx<-56||sx>NW+56) continue;
    ctx.fillStyle='#fff';
    ctx.fillRect(sx+4, cl.y+8,34,8);
    ctx.fillRect(sx+10,cl.y+4,12,8);
    ctx.fillRect(sx+18,cl.y,   14,12);
    ctx.fillRect(sx+30,cl.y+4, 8, 8);
  }
  // Hills
  const hills=[
    {x:0,y:NH-32,r:28},{x:96,y:NH-42,r:36},{x:224,y:NH-32,r:28},
    {x:352,y:NH-42,r:36},{x:512,y:NH-32,r:28},{x:672,y:NH-42,r:36},
  ];
  for(const h of hills){
    const sx=h.x-camX*0.7;
    if(sx<-80||sx>NW+80) continue;
    ctx.fillStyle='#00a000';
    ctx.beginPath(); ctx.arc(sx+h.r,h.y+h.r,h.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00c800';
    ctx.beginPath(); ctx.arc(sx+h.r,h.y+h.r*0.6,h.r*0.5,0,Math.PI*2); ctx.fill();
  }
}

function drawFlag(camX){
  const px=198*TILE-camX; if(px<-10||px>NW+20) return;
  ctx.fillStyle='#d8d800';
  ctx.beginPath(); ctx.arc(px+9,2*TILE+3,4,0,Math.PI*2); ctx.fill();
  const wave=Math.sin(Date.now()/200)*2;
  ctx.fillStyle='#e82020';
  ctx.beginPath();
  ctx.moveTo(px+9,2*TILE+7);
  ctx.lineTo(px+9+16+wave,2*TILE+13);
  ctx.lineTo(px+9,2*TILE+20);
  ctx.closePath(); ctx.fill();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const camX=camera.x;
  ctx.fillStyle=C.sky; ctx.fillRect(0,0,NW,NH);

  if(gState.phase==='WORLD_INTRO'){ drawWorldIntro(); return; }
  if(gState.phase==='GAME_OVER')  { drawGameOver();   return; }

  drawScenery(camX);
  tilemap.draw(camX);
  drawFlag(camX);
  drawObjects(camX);
  drawFireballs(camX);
  for(const e of enemies) e.draw(camX);
  drawParticles(camX);
  mario.draw(camX);
  drawHUD();
  if(gState.phase==='LEVEL_CLEAR') drawLevelClear();
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
const ld      = buildLevel11();
const tilemap = new TileMap(ld.data,ld.w,ld.h);
const mario   = new Mario(3*TILE,11*TILE);
const camera  = new Camera();
const sfx     = new SoundEngine();
const enemies = [];
gState.mario  = mario;

for(const sp of ld.spawns){
  if(sp.type==='goomba') enemies.push(new Goomba(sp.col*TILE, sp.row*TILE));
  if(sp.type==='koopa')  enemies.push(new Koopa(sp.col*TILE,  sp.row*TILE));
}

document.addEventListener('keydown',e=>{ if(e.code==='KeyM') sfx.muted=!sfx.muted; });

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let last=0, acc=0;
function loop(ts){
  acc+=ts-last; last=ts;
  if(acc>200) acc=200;
  while(acc>=DT){ gState.update(); acc-=DT; }
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{ last=ts; requestAnimationFrame(loop); });

// ─── DEBUG API ────────────────────────────────────────────────────────────────
if(new URLSearchParams(location.search).get('debug')==='1'){
  window.__marioDebug={
    getState:()=>({
      mario:{x:mario.x,y:mario.y,vx:mario.vx,vy:mario.vy,state:mario.form,onGround:mario.onGround,dead:mario.dead},
      score:gState.score,coins:gState.coins,lives:gState.lives,
      world:gState.world,level:gState.level,timeLeft:gState.timeLeft,
      phase:gState.phase,camX:camera.x,
      enemies:enemies.map(e=>({type:e.constructor.name,x:e.x,y:e.y,alive:e.alive})),
    }),
    teleportMario:(x,y)=>{ mario.x=x; mario.y=y; mario.vx=0; mario.vy=0; },
    setWorld:(w,l)=>{ gState.world=w; gState.level=l; },
    toggleInvincible:()=>{ mario.invTimer=mario.invTimer>0?0:600; },
    skipToFlagpole:()=>{ mario.x=194*TILE; mario.y=5*TILE; mario.vx=0; mario.vy=0; },
    giveFireMario:()=>{ mario.form='FIRE'; },
  };
}
